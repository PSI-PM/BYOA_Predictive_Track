  "PT3::base": { bestIndex: 0, explanation: "The customer's feasibility question and the Priya-Tom rupture aren't actually separable in this moment, even though sequencing the business question first might sound like the more professional priority. Both Tom and Priya are visibly too activated by what just happened between them — rattled, reacting badly — to give a clear, level answer about whether the requested feature is realistically achievable, which means the interpersonal rupture is actively blocking the very business judgment the customer question needs. An emergency three-way meeting addresses what's actually stopping a good answer from being possible right now, rather than asking for a calm assessment from two people who, this exact moment, can't give one. Asking Felix for a neutral technical read sidesteps the live human rupture entirely, treating what just happened between the two founders as if it were purely a technical feasibility question rather than the first time this disagreement has stopped being polite." },
  "E5::thriving": { bestIndex: 0, explanation: "With genuinely strong, validated defect-rate performance, documenting the process as the new standard locks in a real win for this facility's own future use. Rolling it out company-wide goes further than the evidence supports — this is one pilot line's results on one product, and generalizing that success to a different part of the business (Soren's original flight-controller line, not just this drone facility) before even documenting what specifically made it work is a real overreach, not simply a matter of moving fast. Pushing for even tighter tolerances chases marginal improvement at real cost — slower production, more rejects — on a process that's already performing ahead of target with no identified problem to justify it." },
  "E5::strained": { bestIndex: 0, explanation: "Felix already flagged this exact failure mode as a risk back during design review, which means there's already an informed hypothesis in hand about why this is happening — pausing to root-cause with Felix leverages that existing context more precisely and faster than starting a joint investigation from scratch with an outside vendor who doesn't have it. Vendor collaboration is a reasonable next step if internal root-causing doesn't resolve it, but starting there skips the faster, more informed path available first. Continuing to run and sorting defects at inspection treats a known structural risk, one specifically predicted in advance, as an acceptable cost of doing business rather than something to actually fix." },
  "E5::failing": { bestIndex: 0, explanation: "This is a higher-stakes version of diagnosing before solutioning: the battery mount is the exact area Dr. Osei flagged as safety-critical, and the report being delivered in person rather than by email is itself a signal of real severity. Quarantining the batch and rebuilding the fixture assumes a root cause that hasn't actually been confirmed yet — several units sharing a flaw establishes a pattern, not a diagnosis, and jumping to a fix on a safety-critical finding without independent verification risks fixing the wrong thing. Halting production and bringing in a quality consultant gets genuinely independent expertise on a safety question where Soren's own engineering team's first guess isn't sufficient verification. Shipping at current quality risks real harm before any unit reaches a customer." },
  "E6::thriving": { bestIndex: 0, explanation: "The scene's own condition for safety is being able to say Soren's battery is genuinely different 'credibly and quickly' — and proactive direct communication can use facts already confirmed in this exact scene (different chemistry, manufacturer, thermal design) immediately, satisfying both halves of that condition at once. Commissioning a comparative safety brief is more thorough but structurally slower, trading away the speed the scene specifically names as necessary, for formality the already-confirmed facts don't actually require. Saying nothing risks letting customers and investors default to assuming Soren shares the same exposure, purely through industry proximity, when correcting that is fast and costs nothing." },
  "E6::strained": { bestIndex: 0, explanation: "The uncertainty named in this scene is specifically about documentation readiness — whether the existing audits and paperwork are as airtight as they should be — not about any confirmed physical defect; that's a different, more severe situation that doesn't appear in this version of events. Commissioning an independent safety audit closes exactly that documentation gap. Pausing battery installs is a response sized for a confirmed safety problem that hasn't actually been established here, overreacting to a paperwork question as if it were a physical one. Reassuring investors verbally, with no new evidence, doesn't answer the specific, informed questions they're already asking after having done their own reading." },
  "E7::thriving": { bestIndex: 0, explanation: "The text specifically describes this rumor as already having an outsized echo — meaning amplification has already happened regardless of how Soren responds, so the usual concern about a formal response drawing more attention than a quiet rumor deserves doesn't apply here; attention is already elevated, and the actual problem is accuracy, not exposure. A clear factual update directly closes the gap between what's true and what the stripped-of-context version implies. Addressing it casually in the next routine meeting introduces a delay before correcting an already-circulating inaccurate impression, for no real benefit, since the wait-and-stay-quiet rationale only makes sense when a rumor is still contained. Ignoring it leaves a customer-relevant inaccuracy standing when correcting it costs almost nothing." },
  "E7::strained": { bestIndex: 0, explanation: "Calling key stakeholders individually first isn't unreasonable on its own — Tom's customer relationship is real and worth direct attention — but the story is already in print, citing unnamed sources, which means a speculative public account is already taking shape. Every hour that account goes unanswered publicly, it hardens further as the only available version for everyone not on the personal call list. A transparent press statement addresses that specific, time-sensitive cost; individual calls are likely still worth making, but sequencing them as a prerequisite to any public statement leaves the broader, already-public narrative unaddressed while it solidifies. Staying silent is a passive bet against a story that's already proven to have legs." },
  "E7::failing": { bestIndex: 2, explanation: "The problem described here is specifically multiple external outlets running stories of varying accuracy, with the narrative actively slipping away from Soren's own framing — a different, more specialized problem than internal stakeholder alignment. An emergency all-hands briefing is the right tool for getting Soren's own people aligned on one story, but it doesn't directly engage the external outlets actually driving the coverage; the scope here has exceeded what internal alignment alone is built to solve, calling for the kind of multi-outlet message discipline and outside relationships a crisis communications specialist provides. A defensive denial is particularly risky once coverage ranges from roughly accurate to wildly speculative — denying something that's at least partly true looks dishonest the moment any accurate detail is independently confirmed." },
  "E8::thriving": { bestIndex: 0, explanation: "Yuki's specific fear, stated directly in the break room, is about documentation done to her rather than with her — not about documentation itself. This tier's favorable conditions are exactly what make the difference: with room to make this collaborative, formal documentation done with her input addresses that fear through process while still producing a durable, organization-level knowledge asset. Pairing with a junior tech as a shadow transfers knowledge to one person experientially, but if that junior tech also eventually leaves, the same single-point-of-failure risk resurfaces — it's a real complement, not a substitute for an asset that survives anyone's departure. Letting it stay informal preserves the original risk for no reason when conditions specifically allow fixing it properly." },
  "E8::strained": { bestIndex: 2, explanation: "Yuki hasn't decided anything yet, and the accumulated stress behind her considering other offers is named directly: the recall scare, press attention, and feeling undervalued. A retention bonus tied to a knowledge-transfer period addresses both problems through one mechanism — it signals real value placed on her contribution while structurally guaranteeing the transfer period happens as a condition of the bonus, rather than treating retention and knowledge capture as separate competing actions. Urgently documenting her knowledge now, without addressing why she's looking elsewhere at all, risks confirming the exact fear she's already named — that the company only wants what's in her head before she's gone — rather than addressing it. Hoping she stays and dealing with it if she doesn't gambles the entire calibration process on an outcome no longer fully in the project's control." },
  "E8::failing": { bestIndex: 0, explanation: "Retention is no longer the live question — Yuki has already given notice — which makes this purely a knowledge-recovery problem, and she's the only source of the specific, idiosyncratic knowledge that's actually missing. Having the remaining team reverse-engineer the process risks recreating an incomplete or subtly wrong version of something the scene itself says was never fully visible to anyone but her. An outside specialist brings general calibration expertise, but not this specific rig's particular behavior, which ran on her instincts specifically rather than a documented, transferable method. Bringing her back as a paid consultant is the only option that recovers the knowledge from its actual source before it's gone for good." },
  "E9::thriving": { bestIndex: 1, explanation: "All three options are genuinely reasonable uses of a clean result — there's no sharp principle violation in using it as a confidence win or documenting it as an internal template. What tips this one is a detail specific to this auditor: he's characterized as giving away nothing for two hours, with only a flicker of unusual warmth at the very end — and that window closes the moment his car leaves the parking lot. Asking a guarded, experienced person for informal feedback while he's still there is a low-cost opportunity that expires with his departure, in a way that documenting a template or framing a stakeholder message don't — both of those can happen just as well tomorrow." },
  "E9::strained": { bestIndex: 0, explanation: "The auditor's own diagnosis already describes a pattern, not a one-time snapshot — a company that's been moving faster than its own paperwork. Addressing the gaps slowly while continuing operations at the same pace just continues that exact dynamic the auditor just named, letting new gaps accumulate behind new operations the same way the old ones did. Fixing the gaps immediately and requesting a re-check directly answers the specific, bounded issues described — an incomplete record, an outdated citation — using resources Soren already has, including Dr. Osei. Bringing in an outside compliance specialist is a heavier engagement than gaps the auditor himself characterized as fixable and non-catastrophic actually require." },
  "E9::failing": { bestIndex: 0, explanation: "The auditor's specific concern is that the documentation gaps look, to an outside observer, like an attempt to obscure rather than an honest gap — which makes maximum directness the right response, not less of it. Self-disclosing everything and committing to full remediation directly counters that exact impression. Requesting a third-party mediator inserts a layer of indirection at precisely the moment directness is what would dispel the obscuring read, and the auditor's own tone — serious but procedural, not adversarial — doesn't actually describe a dispute that needs a neutral broker. Voluntarily halting production is a genuinely bold, good-faith move, but on its own it's an action without the explicit disclosure and remediation commitment that actually answers the documentation integrity question being raised. Contesting the findings and minimizing cooperation is the one response that treats a regulator who is actively deciding the facility's operating future as an adversary rather than an authority — the routes to the worst outcome here." },
  "M0a::base": { bestIndex: 0, explanation: "A cost-based threshold sounds like reasonable practicality, but it miscalibrates against the actual risk dimension on this specific product: a cheap part swap on an aviation-adjacent airframe can affect weight distribution or vibration characteristics regardless of its dollar value, while an expensive but safety-irrelevant change would clear the same threshold without issue. Cost and safety relevance aren't the same axis, and thresholding on the wrong one lets a genuinely consequential change slip through ungoverned simply because it was inexpensive. None of the three options on the table threshold on safety relevance directly, which would be the ideal design — but of the three actually available, enforcing strict change control on every deviation is the only one that doesn't risk waving through an unreviewed change specifically because of its price tag. Allowing minor adjustments without any formal process at all abandons change-control discipline entirely, which is worse regardless of which threshold question is at stake." },
  "QD1::base": { bestIndex: 0, explanation: "Scoping the gap internally before looping in Dr. Osei sounds like reasonable sequencing, but she's the regulatory expert already established throughout this project specifically for FAA-relevant questions — bringing her in early lets her help shape what the investigation actually needs to look for, rather than the team guessing at what matters and potentially missing something she'd have flagged immediately. Immediate disclosure isn't jumping ahead of the facts; it's using the right expertise to determine which facts to gather in the first place. Reconstructing from secondary records and quietly moving forward treats a potential compliance gap as a documentation inconvenience to patch over internally — the same shape as documentation that reads as an attempt to obscure rather than an honest gap, a distinction that's already mattered enormously elsewhere in this project." },
  "M1::thriving": { bestIndex: 0, explanation: "Both other options share the same shape: leveraging today's good news into something the data doesn't yet support. This is a single pilot unit's acceptance result, not yet a demonstrated production track record — Build's own arc showed defect rates and staffing consistency are real, live questions, not settled certainties. Requesting an early second-unit order risks committing to a bigger customer relationship before the facility has shown it can repeat this result reliably at scale; a testimonial asks for a public endorsement based on a short acceptance test rather than real field experience. Formalizing the sign-off and proceeding takes the actual win at face value and moves the real next step forward without overreaching on either front." },
  "M1::strained": { bestIndex: 0, explanation: "The ambiguity is in the contract itself, which means resolving it has to be bilateral — Soren can't unilaterally redefine acceptance criteria a customer already agreed to, the same way it could update its own internal documentation. Formal change control on a customer contract inherently means a documented, mutually agreed update, which is what actually prevents the disagreement from resurfacing later. A joint working session might produce that same outcome, but as worded it only commits to a meeting format, not to ending in the same kind of binding documentation. Verbally agreeing without documentation recreates the exact undocumented-commitment pattern that caused this ambiguity in the first place." },
  "M1::failing": { bestIndex: 0, explanation: "Tom's explicit ask is to know what actually went wrong — owning the failure and committing to a real corrective action plan is the only option that directly answers that, with honest acknowledgment now and a credible commitment to a real fix once the endurance shortfall is properly root-caused. An interim concession sidesteps the explanation Tom specifically asked for, offering something concrete without addressing the actual question on the table. Arguing the acceptance criteria were unclear disputes a performance shortfall against a contracted spec rather than owning it, which undermines the accountability a customer this upset needs to see before they'll engage with any proposed fix at all." },
  "M1b::base": { bestIndex: 0, explanation: "The scene draws a specific, deliberate distinction: whether people feel informed rather than simply notified. That's a subjective, felt experience, not a behavioral metric — open rates and response rates measure engagement (did they open it, did they reply), which is a real but different thing from whether the content actually met what someone needed to feel informed. Someone can open every update and still feel under-informed if the content isn't what they actually needed; a low response rate might just mean no follow-up questions, not dissatisfaction. Directly surveying stakeholders is the only option that measures the specific thing the scene says is actually in question. Trusting that silence means success ignores something the log itself just showed: a planned community update never went out at all, and nobody loudly noticed — silence already happened once in this exact data, and it didn't mean things were working." },
  "M2::thriving": { bestIndex: 1, explanation: "This is genuinely close, and the case for proactive recovery isn't unreasonable — but the float here is explicitly described as deliberately engineered margin, not wishful thinking, and the delay itself is framed as a normal learning curve rather than a real problem. That's precisely the situation contingency float exists to absorb without intervention. Spending extra resources to recover margin that hasn't actually been threatened, for a temporary, self-correcting phenomenon, uses up effort solving something already in the process of resolving on its own — and reassigning a technician from a less critical task carries that same cost plus a new one, creating a second, smaller gap elsewhere to patch a float that was functioning exactly as designed. Letting it ride trusts the deliberately built margin to do the job it was built for." },
  "M2::strained": { bestIndex: 2, explanation: "Calibration being on the critical path is a meaningfully different situation than normal learning-curve variance — the float that would absorb minor variance is no longer the relevant fact once a station is actively moving the delivery date. Fast-tracking a parallel calibration setup directly addresses the actual bottleneck rather than just compressing around it or accepting the slip outright. Crashing the schedule with overtime pushes harder on the same single station already proven to be the chokepoint, risking the kind of strain and quality issues this project has already shown can compound; accepting the slip and notifying the sponsor early is honest but passive when a real structural fix is available." },
  "M2::failing": { bestIndex: 0, explanation: "With calibration now a genuine production blockage backing up the entire line, bringing in a second calibration vendor at high cost is the only option that actually unblocks the bottleneck quickly enough to prevent further schedule erosion, even though it's expensive. A major schedule reset accepts a worse outcome than necessary when a real, if costly, unblocking option exists; a manual workaround risks introducing new quality problems on a process this project has already shown is sensitive to the kind of specific, hard-to-replace expertise a rushed substitute wouldn't have." },
  "M3::thriving": { bestIndex: 0, explanation: "This specific change order is genuinely fine on its own merits, but the other two options both pattern-match on the wrong axis for future requests. Setting it as a precedent for similar future requests invites approving later changes that share this one's low cost but not necessarily its safety-irrelevance — the same miscalibration this project has already learned to avoid when cost, not safety relevance, became the basis for review. Bundling it with an unrelated improvement risks letting that second change ride through attached to an obviously-good one without its own distinct evaluation. Approving it through normal change control evaluates this change on its own specific merits, which is what every change actually needs, regardless of how clean the last one was." },
  "M3::strained": { bestIndex: 2, explanation: "Triaging by safety relevance uses the axis this project has already learned is the right one to filter change requests on — a cheap, low-stakes-looking change can still matter on a regulated, aviation-adjacent product, and an expensive one might not matter at all. Freezing all non-critical requests uses a vaguer standard that doesn't specify whether 'critical' actually means safety-relevant or just urgent or expensive, risking the same miscalibration in the other direction. Continuing to approve everything as it arrives ignores both the quantified trend and Dana's own prior warning about exactly this scenario." },
  "M3::failing": { bestIndex: 0, explanation: "With the reserve functionally exhausted and Dana explicitly committed to accuracy over comfort, presenting a transparent full cost reforecast to Marcus is the only option that gives the project's most senior stakeholder a true picture to make a real decision from. Quietly deferring costs to the next period is a deceptive accounting move that resurfaces the same problem later, worse; proposing a scope or schedule trade is a reasonable eventual step but needs to follow an honest accounting of where the budget actually stands, not substitute for it." },
  "M4::thriving": { bestIndex: 1, explanation: "A confident CAD presentation demonstrates sound design logic, but it's theoretical until physically validated — that's a different category of evidence than, say, an experienced engineer's informal sign-off on a structural question already settled by inspection, since the actual claim here is about how a physical part performs under real stress, which a model alone can't confirm. A stress test closes that specific gap before manufacturing tooling gets committed to a design that's only been validated on screen. Approving through change control alone skips that confirmation; delaying rollout to the next batch doesn't add the same technical verification a stress test specifically provides." },
  "M4::strained": { bestIndex: 0, explanation: "With a known structural defect that's already failed once in the field, approving the redesign despite the tooling cost is the only option that actually fixes the underlying engineering problem Felix has now flagged twice. Patching the existing design again repeats the exact mistake that led to this conversation in the first place. Phasing the redesign in only on new units adopts the right fix going forward but leaves existing units already built or in the field with the same known defect, with no stated plan to address them." },
  "M4::failing": { bestIndex: 0, explanation: "Approving the full redesign is what makes any future retrofit substantive — recalling and retrofitting affected units, on its own, doesn't specify what the units would actually be retrofitted with absent a confirmed engineering fix to apply. Ideally both happen together: the redesign approved and a retrofit plan for units already in the field, but between the three options as worded, the redesign is the foundational piece the others depend on. A stopgap fix risks a repeat failure with potentially more serious consequences on a part that's already shown it can fail in the field." },
  "M5::thriving": { bestIndex: 0, explanation: "Marcus's reassurance just came from a careful, rigorous comparison that already worked on the most relevant audience — seeking customer feedback to validate the same claim again doesn't add meaningfully new information once a comparison this thorough has already convinced him. Accelerating marketing has no equivalent trigger here the way a real opportunity sometimes does elsewhere — there's no public moment or established momentum this scene points to, just a private, internal reassurance, which makes marketing acceleration a generic instinct rather than something this specific situation actually calls for. Staying the course and leaning on quality differentiation follows directly from what just happened: a real, validated competitive advantage, without requiring any unstated assumption about timing or readiness." },
  "M5::strained": { bestIndex: 0, explanation: "A limited early-access release sounds like a measured middle path, but 'limited' only reduces the scale of exposure, not the underlying problem — it still means shipping real units to real customers before remaining testing is complete, with an active, unresolved bracket safety question already sitting in this same phase. A smaller blast radius is still a blast radius. Compressing remaining testing is the same risk without even the modesty of scale. Resisting pressure to cut corners is the only option that doesn't add a new, rushed risk on top of problems already accumulating this phase." },
  "M5::failing": { bestIndex: 2, explanation: "Marcus's literal question is whether the project still makes sense — a question about ongoing viability that a persuasive argument alone doesn't actually answer, especially after a track record this phase has already shown to include real, compounding failures. A 30-day go/no-go checkpoint operationalizes the same underlying conviction as arguing for finishing it right, but makes it falsifiable and time-bound rather than something Marcus simply has to trust on faith — which is what a track record like this one actually calls for. Promising an accelerated timeline that may not be achievable risks a second broken commitment stacked on the first." },
  "HL2::base": { bestIndex: 0, explanation: "Hollis itself already set the terms of this conversation: not asking for anything today, just confirming the door stays open for a year out. Telling them Soren is genuinely interested and will follow up once the inspection line ships matches that exact low-pressure framing — real interest, no premature commitment, nothing happening before the current phase's pressures resolve. Looping Priya in to lead the conversation going forward commits a key team member's ongoing attention to a second, not-yet-real business thread at the exact moment the scene names attention as already stretched thin this phase. Declining gracefully forecloses a door Hollis explicitly said could stay open at no real cost to leaving it open." },
  "M6::thriving": { bestIndex: 1, explanation: "The amicable tenor of this departure and the underlying knowledge-transfer risk are separate questions — a parting can be completely clean and well-deserved while the person leaving still carries real, hard-won institutional knowledge nobody else has. Felix has repeatedly been the one proven right about risks others didn't immediately credit; that value doesn't evaporate just because he's leaving on good terms. Asking him to consult part-time during the transition captures that knowledge while it's still available, at low cost given how positive the exit actually is. Backfilling calmly misses an easy opportunity for continuity; restructuring the role is a bigger intervention than a smooth, voluntary departure actually requires." },
  "M6::strained": { bestIndex: 0, explanation: "Felix's own diagnosis — accumulated exhaustion, not money — is information that only surfaces through the exit interview itself; redistributing workload immediately, without that conversation, means guessing at a cause rather than acting on the one Felix actually named. Addressing root causes for the team is the broader response that would naturally include fixing the workload problem once it's actually confirmed, rather than acting on an assumption about what's wrong. Backfilling fast without reflection repeats whatever conditions wore Felix down on whoever fills the role next." },
  "M6::failing": { bestIndex: 0, explanation: "Felix is already mentally gone by the time this conversation happens, which means retention specifically may no longer be realistic — but the option's wording covers both retaining him and smoothly transitioning the role, and the second half matters more right now. The team is visibly rattled in this exact moment, watching a respected colleague leave under bad circumstances; personal intervention addresses that immediate morale and trust problem directly. An interim contractor solves a capacity gap but does nothing for the team's current emotional state; treating it purely as an HR matter misses the leadership signal a departure like this sends to everyone still there." },
  "M7::thriving": { bestIndex: 2, explanation: "Requesting budget for a second facility borrows credibility from a hard-won moment to make a much larger, separate ask that deserves its own business case — unlike capitalizing on a tightly-coupled opportunity, this attaches an unrelated, substantial decision to a moment of relief that doesn't actually substitute for that justification. With no stated urgency to move straight to commissioning, publicly recognizing the team costs nothing and directly honors what the board itself just implicitly credited — the people who actually carried this project through its hardest stretches." },
  "M7::strained": { bestIndex: 0, explanation: "The skeptical board member's exact question is why this many crises happened, not whether the floor currently looks fine — a floor tour demonstrates the latter without answering the former. A clear-eyed recovery narrative with data is the only option that addresses the specific question actually asked, by speaking to causality and what's structurally different now, not just current state. Downplaying the issues to a board member who has already shown this level of pattern-recognition risks looking evasive to someone clearly tracking the bigger picture." },
  "M7::failing": { bestIndex: 0, explanation: "The room hasn't decided anything yet — the board member's question is live, not settled — which makes a turnaround plan the option that actually tests whether confidence can be earned back, rather than assuming it can't. Offering to step back under a new lead concedes the board's doubt before attempting to answer it with substance, and assumes a ready replacement that nothing in the room has established. Requesting a two-week audit before any decision reads as delay exactly when directness is what the moment calls for — the board's language signals they're ready to decide now, not that they need more time to gather information. Defending the record without acknowledging the pattern answers a question nobody asked while ignoring the one that was." },
  "OPS1::base": { bestIndex: 0, explanation: "Carol's specific complaint is that the handover documentation assumes institutional memory living in people's heads rather than in durable, written form — exactly the pattern that already cost the project Felix's knowledge once he left. Offering to remain informally available after handover doesn't break that pattern, it just replaces Felix with the PM as the new single point of failure; if the PM becomes unreachable, the same problem recurs in a different shape. Formally documenting the knowledge now, even at a real schedule cost, is the only option that actually closes the gap Carol named rather than relocating it. Reassuring her that operations will develop its own knowledge over time offers an unfalsifiable claim to someone who has already shown she reads everything carefully and won't accept it." },
  "C1::thriving": { bestIndex: 0, explanation: "Every checklist item already passed with genuine confidence — safety, production rate, quality metrics, all confirmed without needing intervention. Running one more stress test cycle doesn't introduce a meaningfully different kind of evidence, it just repeats the same category of test that already passed; unlike validating a CAD model against physical reality, this is checking something that's already been checked. Inviting operations leadership to co-sign is a reasonable governance gesture, but the substantive knowledge-transfer work this would support already happened, or should have, in the handover conversation with Carol — this just adds ceremony on top of work already done. Proceeding to formal handover is taking yes for an answer once a genuinely complete process has actually concluded, rather than manufacturing an extra step nothing in this scene actually calls for." },
  "C1::strained": { bestIndex: 0, explanation: "The scene names its own warning directly: these items are easy to defer and easy to regret deferring. A known-issues list is honest, unlike concealment, but it still defers exactly what the text itself flags as something people tend to regret putting off. A warranty period is also a structural mismatch — that's a vendor-contract mechanism for equipment defects, not a tool that applies to internal completion tasks like unfinished signage or a rescheduled generator test. Resolving the punch-list items now, while attention is already mobilized for commissioning, is the only option that actually avoids the regret the scene warns about." },
  "C1::failing": { bestIndex: 0, explanation: "An independent auditor is valuable when there's a genuine ambiguity or credibility question to resolve — but here the facts are already clear and undisputed: a safety system failed its first test, and there are more open items than closed ones. What's needed is action on already-clear information, not a third assessment of facts nobody is actually disputing. Delaying handoff until the line is genuinely production-ready is the only response proportionate to what commissioning just revealed. Handing off anyway under sponsor pressure passes a known, unresolved safety risk onto operations." },

function pickChoice(choice, beatId, tier, choiceIndex) {
  const key = `${beatId}::${tier}::${choiceIndex}`;
  const delta = HIDDEN_DELTAS[key] || {};
  applyDelta(delta);
  history.push(beatId);
  decisionLog.push({ beatId, tier, choiceIndex });
  currentBeatId = choice.next;
  render();
  saveCloudProgress();
}

function advanceNarrative(beatId, nextId) {
  history.push(beatId);
  currentBeatId = nextId;
  render();
  saveCloudProgress();
}

async function restart() {
  state = { ...START_STATE };
  currentBeatId = "N_F1";
  history = [];
  decisionLog = [];
  reviewMode = false;
  portfolioMode = false;
  formSubmissions = {};
  activeFormBeatId = null;
  activeFormTableRows = {};
  activeFormFieldValues = {};
  render();
  await deleteCloudProgress();
  saveCloudProgress();
}

function breadcrumbHTML(currentPhase) {
  const idx = PHASE_ORDER.indexOf(currentPhase);
  return `<div class="breadcrumb">` + PHASE_ORDER.map((phase, i) => {
    let cls = "seg";
    if (i < idx) cls += " done";
    if (i === idx) cls += " active";
    return `<div class="${cls}">${phase}</div>`;
  }).join("") + `</div>`;
}

// Real beat counts per phase (Feasibility 24, Design 87, Build 46, Check 31,
// Transfer 11, Close 3 — 202 total). Used as fixed weights so the overall
// progress bar's fill speed matches actual content density instead of
// treating every phase as equal-sized. A single flat "beats visited out of
// 202" number would also work, but weighting by phase means the bar still
// reads sensibly even though branching means no single playthrough visits
// every beat — progress within the CURRENT phase is what's actually known
// with certainty, and prior phases are counted as fully complete once left.
const PHASE_BEAT_WEIGHTS = {
  "Feasibility": 24, "Design": 87, "Build": 46,
  "Check": 31, "Transfer": 11, "Close": 3,
};
const TOTAL_BEAT_WEIGHT = Object.values(PHASE_BEAT_WEIGHTS).reduce((a, b) => a + b, 0);

function overallProgressPercent(currentPhase) {
  const idx = PHASE_ORDER.indexOf(currentPhase);
  if (idx === -1) return 0;

  // Sum of weights for every phase fully completed (all phases before the current one)
  let completedWeight = 0;
  for (let i = 0; i < idx; i++) {
    completedWeight += PHASE_BEAT_WEIGHTS[PHASE_ORDER[i]];
  }

  // Fractional progress through the CURRENT phase, estimated from how many
  // beats in `history` belong to this phase vs. this phase's total weight.
  // Capped at 95% of the phase's own weight so the bar never claims a phase
  // is fully done until the player actually leaves it (avoids a bar that
  // reads 100% while still showing content from that phase).
  const beatsInCurrentPhase = history.filter(bid => {
    const b = BEATS[bid];
    return b && b.phase === currentPhase;
  }).length;
  const phaseWeight = PHASE_BEAT_WEIGHTS[currentPhase] || 1;
  const phaseFraction = Math.min(0.95, beatsInCurrentPhase / phaseWeight);
  const currentPhaseContribution = phaseFraction * phaseWeight;

  const percent = ((completedWeight + currentPhaseContribution) / TOTAL_BEAT_WEIGHT) * 100;
  return Math.max(1, Math.min(99, Math.round(percent))); // never show a bare 0% or a premature 100%
}

function overallProgressBarHTML(currentPhase) {
  const pct = overallProgressPercent(currentPhase);
  return `
    <div class="overall-progress">
      <div class="overall-progress-track">
        <div class="overall-progress-fill" style="width: ${pct}%"></div>
      </div>
      <div class="overall-progress-label">${pct}% through the course</div>
    </div>
  `;
}

// FORM SCORING ENGINE — deterministic, rubric-based, no API calls.

function countWords(str) {
  if (!str) return 0;
  return str.trim().split(/\s+/).filter(Boolean).length;
}

function countPopulatedRows(rows) {
  if (!Array.isArray(rows)) return 0;
  return rows.filter(row =>
    Array.isArray(row) && row.some(cell => (cell || "").trim().length > 0)
  ).length;
}

function containsKeyword(str, keywords) {
  if (!str || !keywords || keywords.length === 0) return null; // N/A
  const lower = str.toLowerCase();
  return keywords.some(k => lower.includes(k.toLowerCase()));
}

// Score a single field. Returns { score: 0-1, checks: {...} }
function scoreField(fieldDef, value) {
  const checks = {};
  let applicable = [];

  // --- Completeness ---
  let hasContent;
  if (fieldDef.type === "table") {
    const rows = value || [];
    hasContent = countPopulatedRows(rows) > 0;
  } else {
    hasContent = !!(value && value.trim().length > 0);
  }
  checks.completeness = hasContent;
  applicable.push(hasContent ? 1 : 0);

  // --- Depth ---
  let depthOk = null;
  if (fieldDef.type === "table") {
    const rows = value || [];
    const populated = countPopulatedRows(rows);
    depthOk = populated >= (fieldDef.minRows || 1);
    checks.depth = depthOk;
    applicable.push(depthOk ? 1 : 0);
  } else if (fieldDef.minWords) {
    const words = countWords(value);
    depthOk = words >= fieldDef.minWords;
    checks.depth = depthOk;
    applicable.push(depthOk ? 1 : 0);
  }

  // --- Keyword relevance (only if defined) ---
  if (fieldDef.keywords && fieldDef.type !== "table") {
    const kwOk = containsKeyword(value, fieldDef.keywords);
    checks.keywords = kwOk;
    applicable.push(kwOk ? 1 : 0);
  } else if (fieldDef.keywords && fieldDef.type === "table") {
    // For tables, check keyword presence across all cells
    const flat = (value || []).flat().join(" ");
    const kwOk = containsKeyword(flat, fieldDef.keywords);
    checks.keywords = kwOk;
    applicable.push(kwOk ? 1 : 0);
  }

  const score = applicable.length > 0
    ? applicable.reduce((a, b) => a + b, 0) / applicable.length
    : 0;

  return { score, checks };
}

// Score an entire form submission.
// formDef: { fields: [...] }
// submission: { fieldId: value, ... }
// Returns: { score: 0-100, fieldResults: {...}, strengths: [...], weaknesses: [...] }
function scoreForm(formDef, submission) {
  const requiredFields = formDef.fields.filter(f => f.required);
  const optionalFields = formDef.fields.filter(f => !f.required);

  let weightedTotal = 0;
  const fieldResults = {};
  const strengths = [];
  const weaknesses = [];
  const weaknessHints = []; // parallel array: hint text for each weakness

  for (const field of requiredFields) {
    const value = submission[field.id];
    const result = scoreField(field, value);
    fieldResults[field.id] = result;
    weightedTotal += result.score;

    if (result.score >= 0.8) {
      strengths.push(field.label);
    } else if (result.score < 0.5) {
      weaknesses.push(field.label);
      // Include the field's coaching hint if defined, otherwise null
      weaknessHints.push(field.hint || null);
    }
  }

  let baseScore = requiredFields.length > 0
    ? (weightedTotal / requiredFields.length) * 100
    : 0;

  // Optional field bonus: up to +5 total, only if required fields are
  // reasonably complete (baseScore >= 50) so optional content can't
  // mask missing required content.
  let bonus = 0;
  if (baseScore >= 50 && optionalFields.length > 0) {
    let optionalHits = 0;
    for (const field of optionalFields) {
      const value = submission[field.id];
      const result = scoreField(field, value);
      fieldResults[field.id] = result;
      if (result.score >= 0.6) optionalHits++;
    }
    bonus = Math.min(5, (optionalHits / optionalFields.length) * 5);
  }

  const finalScore = Math.min(100, Math.round(baseScore + bonus));

  return {
    score: finalScore,
    fieldResults,
    strengths,
    weaknesses,
    weaknessHints,
  };
}

// Map a form's domains to meter deltas based on score.
// domains: array like ["Finance"] or ["Governance", "Risk"]
const DOMAIN_TO_METER = {
  "Finance": "budget",
  "Schedule": "schedule",
  "Risk": "risk",
  "Quality": "quality",
  "Governance": "trust",
  "Scope": "trust",
  "Stakeholders": "trust",
  "Resources": "trust",
};

function scoreToDelta(score) {
  if (score >= 85) return 3;
  if (score >= 70) return 1;
  if (score >= 50) return 0;
  if (score >= 30) return -2;
  return -4;
}

// Returns { meterKey: delta, ... } — may have multiple meters if domains
// map to more than one, or if a form has 2 domains mapping to 2 different
// meters (e.g. Governance+Finance -> trust + budget both get the delta).
function getMeterDeltas(domains, score) {
  const delta = scoreToDelta(score);
  const meters = new Set();
  for (const d of domains) {
    const meter = DOMAIN_TO_METER[d];
    if (meter) meters.add(meter);
  }
  const result = {};
  for (const m of meters) {
    result[m] = delta;
  }
  return result;
}

// Generate human-readable feedback summary for a submission.
function generateFeedback(formResult, artifactName) {
  const { score, strengths, weaknesses } = formResult;
  let tier;
  if (score >= 85) tier = "Strong";
  else if (score >= 70) tier = "Solid";
  else if (score >= 50) tier = "Adequate";
  else if (score >= 30) tier = "Weak";
  else tier = "Incomplete";

  let summary = `${tier} submission for ${artifactName} (${score}/100).`;
  if (strengths.length > 0) {
    summary += ` Strong on: ${strengths.join(", ")}.`;
  }
  if (weaknesses.length > 0) {
    summary += ` Needs more depth on: ${weaknesses.join(", ")}.`;
  }
  return summary;
}


let formSubmissions = {}; // beatId -> { score, fieldResults, strengths, weaknesses, artifactName, domains }
let activeFormBeatId = null; // which form modal is currently open, if any
let activeFormFieldValues = {}; // fieldId -> string, for text/textarea fields in the open modal
let activeFormTableRows = {}; // fieldId -> array of row arrays, for table-type fields in the open modal

function openFormModal(beatId) {
  activeFormBeatId = beatId;
  const formDef = FORM_DEFINITIONS[beatId];
  activeFormTableRows = {};
  activeFormFieldValues = {};
  if (formDef) {
    for (const field of formDef.fields) {
      if (field.type === "table") {
        const minRows = Math.max(field.minRows || 1, 1);
        activeFormTableRows[field.id] = Array.from({ length: minRows + 1 }, () =>
          new Array(field.tableColumns.length).fill("")
        );
      } else {
        activeFormFieldValues[field.id] = "";
      }
    }
  }
  render();
}

function closeFormModal() {
  activeFormBeatId = null;
  render();
}

function addTableRow(fieldId, numCols) {
  if (!activeFormTableRows[fieldId]) activeFormTableRows[fieldId] = [];
  activeFormTableRows[fieldId].push(new Array(numCols).fill(""));
  render();
  // Restore focus to the new row's first input so typing isn't interrupted.
  const lastRowIdx = activeFormTableRows[fieldId].length - 1;
  const newInput = document.querySelector(`input[data-field="${fieldId}"][data-row="${lastRowIdx}"][data-col="0"]`);
  if (newInput) newInput.focus();
}

function deleteTableRow(fieldId, rowIdx) {
  if (!activeFormTableRows[fieldId]) return;
  // Never let a table drop below 1 row — an empty table with no inputs
  // at all is a worse state than one blank row, since there'd be nothing
  // left on screen to click "+ Add" from in a visually obvious way.
  if (activeFormTableRows[fieldId].length <= 1) return;
  activeFormTableRows[fieldId].splice(rowIdx, 1);
  render();
}

function updateTextField(fieldId, value) {
  activeFormFieldValues[fieldId] = value;
  // no render() here — re-rendering on every keystroke would lose focus
}

function formFieldInputHTML(field) {
  if (field.type === "table") {
    const rows = activeFormTableRows[field.id] || [];
    const numCols = field.tableColumns.length;
    // Past 3 columns, a horizontal table gets unusably cramped on phone
    // width. Stack each row as a labeled card instead — same data, laid
    // out so every field has room to actually be typed into and read.
    const useStackedLayout = numCols > 3;

    if (useStackedLayout) {
      const cardsHTML = rows.map((row, rIdx) => {
        const rowFieldsHTML = field.tableColumns.map((colLabel, cIdx) => `
          <div class="form-stacked-cell">
            <label class="form-stacked-cell-label">${colLabel}</label>
            <input type="text" class="form-table-input"
              data-field="${field.id}" data-row="${rIdx}" data-col="${cIdx}"
              value="${(row[cIdx] || "").replace(/"/g, "&quot;")}"
              onchange="updateTableCell('${field.id}', ${rIdx}, ${cIdx}, this.value)" />
          </div>
        `).join("");
        return `
          <div class="form-stacked-row">
            <div class="form-stacked-row-header">
              <span class="form-stacked-row-num">Entry ${rIdx + 1}</span>
              <button type="button" class="form-row-delete-btn" onclick="deleteTableRow('${field.id}', ${rIdx})" title="Remove this entry">✕</button>
            </div>
            ${rowFieldsHTML}
          </div>
        `;
      }).join("");
      return `
        <div class="form-field">
          <label class="form-field-label">${field.label}${field.required ? ' <span class="required-star">*</span>' : ""}</label>
          <div class="form-stacked-table">${cardsHTML}</div>
          <button type="button" class="form-add-row-btn" onclick="addTableRow('${field.id}', ${numCols})">+ Add Entry</button>
        </div>
      `;
    }

    // 3 or fewer columns: a real horizontal table still fits comfortably.
    const headerCells = field.tableColumns.map(c => `<th>${c}</th>`).join("");
    const bodyRows = rows.map((row, rIdx) => {
      const cells = field.tableColumns.map((_, cIdx) => `
        <td><input type="text" class="form-table-input"
          data-field="${field.id}" data-row="${rIdx}" data-col="${cIdx}"
          value="${(row[cIdx] || "").replace(/"/g, "&quot;")}"
          onchange="updateTableCell('${field.id}', ${rIdx}, ${cIdx}, this.value)" /></td>
      `).join("");
      return `<tr><td class="form-table-delete-cell"><button type="button" class="form-row-delete-btn" onclick="deleteTableRow('${field.id}', ${rIdx})" title="Remove this entry">✕</button></td>${cells}</tr>`;
    }).join("");
    return `
      <div class="form-field">
        <label class="form-field-label">${field.label}${field.required ? ' <span class="required-star">*</span>' : ""}</label>
        <div class="form-table-scroll">
          <table class="form-input-table">
            <thead><tr><th></th>${headerCells}</tr></thead>
            <tbody>${bodyRows}</tbody>
          </table>
        </div>
        <button type="button" class="form-add-row-btn" onclick="addTableRow('${field.id}', ${numCols})">+ Add Row</button>
      </div>
    `;
  }
  const currentValue = (activeFormFieldValues[field.id] || "").replace(/"/g, "&quot;");
  if (field.type === "textarea") {
    return `
      <div class="form-field">
        <label class="form-field-label">${field.label}${field.required ? ' <span class="required-star">*</span>' : ""}</label>
        <textarea class="form-text-input" id="formfield_${field.id}" rows="4" placeholder="Type your response..."
          onchange="updateTextField('${field.id}', this.value)"
          oninput="updateTextField('${field.id}', this.value)">${currentValue}</textarea>
      </div>
    `;
  }
  // type: "text"
  return `
    <div class="form-field">
      <label class="form-field-label">${field.label}${field.required ? ' <span class="required-star">*</span>' : ""}</label>
      <input type="text" class="form-text-input-single" id="formfield_${field.id}" placeholder="Type your response..."
        value="${currentValue}"
        onchange="updateTextField('${field.id}', this.value)"
        oninput="updateTextField('${field.id}', this.value)" />
    </div>
  `;
}

function updateTableCell(fieldId, rowIdx, colIdx, value) {
  if (!activeFormTableRows[fieldId]) return;
  if (!activeFormTableRows[fieldId][rowIdx]) return;
  activeFormTableRows[fieldId][rowIdx][colIdx] = value;
  // no render() here — re-rendering on every keystroke would lose focus
}

function formModalHTML() {
  if (!activeFormBeatId) return "";
  const beat = BEATS[activeFormBeatId];
  const formDef = FORM_DEFINITIONS[activeFormBeatId];
  if (!beat || !formDef) return "";

  const fieldsHTML = formDef.fields.map(formFieldInputHTML).join("");

  return `
    <div class="form-modal-overlay">
      <div class="form-modal">
        <div class="form-modal-header">
          <h2>${beat.artifactName}</h2>
          <button class="form-modal-close" onclick="closeFormModal()">✕</button>
        </div>
        <div class="form-modal-body">
          ${fieldsHTML}
        </div>
        <div class="form-modal-footer">
          <button class="form-submit-btn" onclick="submitForm('${activeFormBeatId}')">Submit</button>
        </div>
      </div>
    </div>
  `;
}

function collectFormSubmission(beatId) {
  const formDef = FORM_DEFINITIONS[beatId];
  const submission = {};
  for (const field of formDef.fields) {
    if (field.type === "table") {
      submission[field.id] = activeFormTableRows[field.id] || [];
    } else {
      submission[field.id] = activeFormFieldValues[field.id] || "";
    }
  }
  return submission;
}

function submitForm(beatId) {
  const beat = BEATS[beatId];
  const formDef = FORM_DEFINITIONS[beatId];
  const submission = collectFormSubmission(beatId);
  const result = scoreForm(formDef, submission);
  const feedback = generateFeedback(result, beat.artifactName);
  const deltas = getMeterDeltas(beat.domains, result.score);

  applyDelta(deltas);

  formSubmissions[beatId] = {
    ...result,
    feedback,
    artifactName: beat.artifactName,
    domains: beat.domains,
    meterDeltas: deltas,
  };

  activeFormBeatId = null;
  activeFormTableRows = {};
  activeFormFieldValues = {};
  render();
  saveCloudProgress();
}

function formFeedbackCardHTML(submission) {
  const tierClass = submission.score >= 85 ? "tier-strong"
    : submission.score >= 70 ? "tier-solid"
    : submission.score >= 50 ? "tier-adequate"
    : submission.score >= 30 ? "tier-weak"
    : "tier-incomplete";

  const meterChangesHTML = Object.entries(submission.meterDeltas || {}).map(([meter, delta]) => {
    const sign = delta > 0 ? "+" : "";
    const cls = delta > 0 ? "meter-up" : delta < 0 ? "meter-down" : "meter-flat";
    return `<span class="meter-change ${cls}">${meter}: ${sign}${delta}</span>`;
  }).join(" ");

  const strengthsHTML = submission.strengths.length
    ? `<div class="feedback-strengths"><strong>Strong on:</strong> ${submission.strengths.join(", ")}</div>` : "";

  // Weaknesses now render with per-field coaching hints below each label
  const hints = submission.weaknessHints || [];
  const weaknessItemsHTML = submission.weaknesses.map((label, i) => {
    const hint = hints[i];
    return `<div class="feedback-weakness-item">
      <div class="feedback-weakness-label">⚠ ${label}</div>
      ${hint ? `<div class="feedback-weakness-hint">${hint}</div>` : ""}
    </div>`;
  }).join("");

  const weaknessesHTML = submission.weaknesses.length
    ? `<div class="feedback-weaknesses">
        <div class="feedback-weakness-heading">Needs more depth:</div>
        ${weaknessItemsHTML}
      </div>` : "";

  return `
    <div class="form-feedback-card ${tierClass}">
      <div class="feedback-score">${submission.score}<span class="feedback-score-max">/100</span></div>
      <div class="feedback-meters">${meterChangesHTML}</div>
      ${strengthsHTML}
      ${weaknessesHTML}
    </div>
  `;
}

// Maps a submission's score to the same tier used for feedback-card styling,
// then looks up whether this specific form beat has an authored character
// reaction for that tier. Only a handful of high-stakes forms have these —
// most forms render nothing extra here, which is expected.
function formReactionHTML(beat, submission) {
  if (!beat.reactions) return "";
  const tier = submission.score >= 85 ? "strong"
    : submission.score >= 50 ? "adequate"
    : "weak";
  const reactionFn = beat.reactions[tier];
  if (!reactionFn) return "";
  const reactionText = reactionFn(playerName);
  return `
    <div class="form-reaction-card">
      <div class="form-reaction-label">Reaction</div>
      <div class="form-reaction-text">${reactionText}</div>
    </div>
  `;
}

function imageSlotHTML(imagePrompt, imageKey) {
  const shortHint = imagePrompt ? imagePrompt.slice(0, 140) + (imagePrompt.length > 140 ? "…" : "") : "no prompt set";

  if (imageKey && IMAGE_ASSETS.has(imageKey)) {
    const fileSafeKey = imageKey.replace("::", "__");
    // onerror calls a named handler (rather than inlining escaped HTML
    // directly in the attribute) so quote characters in the prompt text
    // or placeholder markup can never break out of the attribute string.
    return `<div class="scene-image scene-image-real" id="imgwrap_${fileSafeKey}">
      <img src="images/${fileSafeKey}.png" alt="${imagePrompt ? imagePrompt.slice(0, 80) : "scene image"}" loading="lazy"
        onerror="handleImageLoadError('imgwrap_${fileSafeKey}')"
        data-prompt-hint="${shortHint.replace(/"/g, "&quot;")}" />
    </div>`;
  }
  return `<div class="scene-image">
    <div class="img-icon">🖼</div>
    <div class="img-label">Image slot — photorealistic style (pending batch generation)</div>
    <div class="img-prompt-hint">${shortHint}</div>
  </div>`;
}

function handleImageLoadError(wrapperId) {
  const wrapper = document.getElementById(wrapperId);
  if (!wrapper) return;
  const img = wrapper.querySelector("img");
  const hint = img ? (img.getAttribute("data-prompt-hint") || "no prompt set") : "no prompt set";
  // Build the fallback as real DOM nodes, not a string re-injected into
  // innerHTML — this sidesteps quote-escaping entirely, which is what
  // broke the original inline-string version of this fallback.
  wrapper.className = "scene-image";
  wrapper.innerHTML = "";
  const icon = document.createElement("div");
  icon.className = "img-icon";
  icon.textContent = "🖼";
  const label = document.createElement("div");
  label.className = "img-label";
  label.textContent = "Image slot — photorealistic style (pending batch generation)";
  const hintEl = document.createElement("div");
  hintEl.className = "img-prompt-hint";
  hintEl.textContent = hint;
  wrapper.appendChild(icon);
  wrapper.appendChild(label);
  wrapper.appendChild(hintEl);
}

function renderBeat() {
  const app = document.getElementById("app");

  if (!playerName) {
    app.innerHTML = `
      <div class="name-gate">
        <h1>BYOA: Predictive Track</h1>
        <p>Build Your Own Adventure<br>Drone Manufacturing Facility Buildout</p>
        <input id="nameInput" type="text" placeholder="Enter your name" maxlength="24" />
        <input id="pinInput" type="text" placeholder="Set a short PIN (e.g. 4 digits)" maxlength="12" />
        <p class="name-gate-hint">Your name + PIN let you pick up where you left off on any device. Remember both — there's no recovery if you forget your PIN.</p>
        <br>
        <button id="beginBtn" onclick="startGame()">Begin</button>
        <div id="loadingNote" class="name-gate-hint" style="display:none;">Checking for saved progress…</div>
      </div>`;
    document.getElementById("nameInput").focus();
    document.getElementById("nameInput").addEventListener("keydown", (e) => { if (e.key === "Enter") document.getElementById("pinInput").focus(); });
    document.getElementById("pinInput").addEventListener("keydown", (e) => { if (e.key === "Enter") startGame(); });
    return;
  }

  // REVIEW SCREEN?
  if (reviewMode) {
    app.innerHTML = reviewScreenHTML();
    return;
  }

  // DOCUMENT PORTFOLIO SCREEN?
  if (portfolioMode) {
    app.innerHTML = portfolioScreenHTML();
    return;
  }

  // ENDING?
  if (ENDINGS[currentBeatId]) {
    const ending = ENDINGS[currentBeatId];
    app.innerHTML = `
      <div class="header"><h1>BYOA — Predictive Track</h1><span class="fa-badge">PROJECT COMPLETE</span></div>
      <div class="overall-progress">
        <div class="overall-progress-track"><div class="overall-progress-fill" style="width: 100%"></div></div>
        <div class="overall-progress-label">100% through the course</div>
      </div>
      ${meterBarHTML()}
      <div class="scene ending-panel ${ending.tier}">
        ${imageSlotHTML(ending.imagePrompt, currentBeatId + "::base")}
        <div class="scene-body">
          <div class="tier-label">${ending.tier} ending</div>
          <h2>${ending.title}</h2>
          <div class="scene-text">${ending.text(playerName)}</div>
          <button class="review-btn" onclick="showReview()">Review My Decisions</button>
          <button class="review-btn" onclick="showPortfolio()">Review My Documents</button>
          <button class="restart-btn" onclick="restart()">Restart Simulation</button>
        </div>
      </div>
      <div class="debug-note">scene: ${currentBeatId} · ${history.length} decisions made · ${Object.keys(formSubmissions).length} documents submitted</div>
    `;
    return;
  }

  const beat = resolveBeat(currentBeatId);
  if (!beat) {
    app.innerHTML = `<div class="scene">⚠️ Missing beat: ${currentBeatId}</div>`;
    return;
  }

  const resolvedTextValue = beat._resolvedText(playerName);
  const isPlaceholder = resolvedTextValue.includes("[PLACEHOLDER");
  const placeholderTagHTML = isPlaceholder
    ? `<span class="placeholder-tag">PLACEHOLDER TEXT — final prose pending</span>`
    : "";

  // NARRATIVE BEAT: no choices, single Continue button
  if (beat.type === "narrative") {
    app.innerHTML = `
      <div class="header"><h1>BYOA — Predictive Track</h1><span class="fa-badge">${beat.focusArea}</span></div>
      ${breadcrumbHTML(beat.phase)}
      ${overallProgressBarHTML(beat.phase)}
      ${meterBarHTML()}
      ${trajectoryBannerHTML()}
      <div class="scene narrative-scene">
        ${imageSlotHTML(beat._resolvedImagePrompt, currentBeatId + "::" + beat._resolvedTier)}
        <div class="scene-body">

          <div class="scene-title">${beat.title}</div>
          <div class="scene-text"><p>${resolvedTextValue.replace(/\n\n/g, "</p><p>")}</p></div>
          ${placeholderTagHTML}
        </div>
      </div>
      <div class="choices">
        <button class="choice-btn continue-btn" onclick='advanceNarrative("${currentBeatId}", "${beat.next}")'>
          <span>Continue</span>
        </button>
      </div>
      <div class="debug-note">trajectory: ${getTrajectory(state)} · decisions so far: ${history.length}</div>
    `;
    return;
  }

  // FORM BEAT: a real fillable artifact, scored on submission against a
  // deterministic rubric. Two render states: not-yet-submitted (show the
  // form) and already-submitted (show the feedback + continue button).
  if (beat.type === "form") {
    const existingSubmission = formSubmissions[currentBeatId];
    const formDef = FORM_DEFINITIONS[currentBeatId];

    if (existingSubmission) {
      const reactionHTML = formReactionHTML(beat, existingSubmission);
      app.innerHTML = `
        <div class="header"><h1>BYOA — Predictive Track</h1><span class="fa-badge">${beat.focusArea}</span></div>
        ${breadcrumbHTML(beat.phase)}
      ${overallProgressBarHTML(beat.phase)}
        ${meterBarHTML()}
        ${trajectoryBannerHTML()}
        <div class="scene form-scene">
          <div class="scene-body">
            <div class="scene-title">📄 ${beat.artifactName}</div>
            ${formFeedbackCardHTML(existingSubmission)}
            ${reactionHTML}
          </div>
        </div>
        <div class="choices">
          <button class="choice-btn continue-btn" onclick='advanceNarrative("${currentBeatId}", "${beat.next}")'>
            <span>Continue</span>
          </button>
        </div>
        <div class="debug-note">trajectory: ${getTrajectory(state)} · decisions so far: ${history.length} · form score: ${existingSubmission.score}/100</div>
      `;
      return;
    }

    app.innerHTML = `
      <div class="header"><h1>BYOA — Predictive Track</h1><span class="fa-badge">${beat.focusArea}</span></div>
      ${breadcrumbHTML(beat.phase)}
      ${overallProgressBarHTML(beat.phase)}
      ${meterBarHTML()}
      ${trajectoryBannerHTML()}
      <div class="scene form-scene">
        <div class="scene-body">
          <div class="scene-title">📄 ${beat.artifactName}</div>
          <div class="scene-text"><p>${resolvedTextValue.replace(/\n\n/g, "</p><p>")}</p></div>
          <div class="form-launch-card">
            <div class="form-launch-detail">Process: ${beat.processOrigin}<br>Focus Area: ${beat.focusArea}</div>
            <button class="form-open-btn" onclick="openFormModal('${currentBeatId}')">Open ${beat.artifactName} Form</button>
          </div>
        </div>
      </div>
      <div class="debug-note">trajectory: ${getTrajectory(state)} · decisions so far: ${history.length}</div>
    `;
    return;
  }

  const letters = ["A", "B", "C", "D"];
  // Shuffle DISPLAY order only. Each choice keeps its original array index
  // (origIndex) so the correct hand-authored delta still gets applied —
  // shuffling only prevents players from learning a positional pattern.
  const indexedChoices = beat._resolvedChoices.map((c, origIndex) => ({ c, origIndex }));
  for (let i = indexedChoices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indexedChoices[i], indexedChoices[j]] = [indexedChoices[j], indexedChoices[i]];
  }
  const choicesHTML = indexedChoices.map(({ c, origIndex }, displayIndex) => {
    const isUnconventional = !!c.unconventional;
    return `<button class="choice-btn${isUnconventional ? " unconventional" : ""}" onclick='pickChoiceWrapper("${currentBeatId}", "${beat._resolvedTier}", ${origIndex}, ${JSON.stringify(c).replace(/'/g, "&apos;")})'>
      <span class="choice-letter">${letters[displayIndex]}</span>
      <span>${c.label}</span>
    </button>`;
  }).join("");

  app.innerHTML = `
    <div class="header"><h1>BYOA — Predictive Track</h1><span class="fa-badge">${beat.focusArea}</span></div>
    ${breadcrumbHTML(beat.phase)}
      ${overallProgressBarHTML(beat.phase)}
    ${meterBarHTML()}
    ${trajectoryBannerHTML()}

        ${placeholderTagHTML}
      </div>
    </div>
    <div class="choices">${choicesHTML}</div>
    <div class="debug-note">trajectory: ${getTrajectory(state)} · decisions so far: ${history.length}${beat.crisisCheckpoint ? " · ⚠ CRISIS CHECKPOINT" : ""}</div>
  `;
}

function render() {
  renderBeat();
  if (activeFormBeatId) {
    const app = document.getElementById("app");
    app.innerHTML += formModalHTML();
  }
}

function pickChoiceWrapper(beatId, tier, choiceIndex, choice) {
  pickChoice(choice, beatId, tier, choiceIndex);
}

async function startGame() {
  const nameVal = document.getElementById("nameInput").value.trim();
  const pinVal = document.getElementById("pinInput").value.trim();

  if (!pinVal) {
    document.getElementById("pinInput").focus();
    document.getElementById("pinInput").placeholder = "PIN required — pick any short code";
    return;
  }

  const key = makeStudentKey(nameVal || "player", pinVal);
  studentKey = key;

  document.getElementById("beginBtn").disabled = true;
  document.getElementById("loadingNote").style.display = "block";

  const saved = await loadCloudProgress(key);

  if (saved && saved.currentBeatId) {
    showResumePrompt(nameVal || "Project Manager", saved);
    return;
  }

  playerName = nameVal || "Project Manager";
  render();
  saveCloudProgress();
}

function showResumePrompt(nameVal, saved) {
  const app = document.getElementById("app");
  const decisionsSoFar = (saved.history || []).length;
  const formsSoFar = Object.keys(saved.formSubmissions || {}).length;
  app.innerHTML = `
    <div class="name-gate">
      <h1>Welcome back, ${nameVal}</h1>
      <p>We found saved progress under this name and PIN: ${decisionsSoFar} decisions made, ${formsSoFar} documents submitted.</p>
      <button onclick="resumeFromSave()">Continue where I left off</button>
      <br><br>
      <button class="secondary-btn" onclick="startOverFromGate('${nameVal.replace(/'/g, "\\'")}')">Start over instead</button>
    </div>`;
  window._pendingResumeSave = saved;
}

function resumeFromSave() {
  applyLoadedGameState(window._pendingResumeSave);
  window._pendingResumeSave = null;
  render();
}

async function startOverFromGate(nameVal) {
  playerName = nameVal || "Project Manager";
  state = { ...START_STATE };
  currentBeatId = "N_F1";
  history = [];
  decisionLog = [];
  formSubmissions = {};
  window._pendingResumeSave = null;
  await deleteCloudProgress();
  render();
  saveCloudProgress();
}

render();
</script>
</body>
</html>
