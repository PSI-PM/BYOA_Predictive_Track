<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BYOA — Drone Facility Buildout (Predictive)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0F1419;
    --panel: #161D26;
    --panel-border: #263240;
    --text: #E8EDF2;
    --text-dim: #8A99A8;
    --amber: #F5A623;
    --green: #3DDC84;
    --red: #E5484D;
    --blue: #4FA8E8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }
  .shell {
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
    padding: clamp(12px, 4vw, 24px);
  }
  @media (min-width: 900px) {
    .shell { max-width: 820px; padding: 28px; }
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--panel-border);
  }
  .header h1 {
    font-size: clamp(13px, 3.5vw, 16px);
    font-weight: 600;
    margin: 0;
    letter-spacing: 0.02em;
  }
  .header .fa-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(9px, 2.4vw, 11px);
    color: var(--amber);
    background: rgba(245,166,35,0.1);
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid rgba(245,166,35,0.3);
    white-space: nowrap;
    margin-left: 8px;
  }

  /* METERS HUD */
  .meters {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(64px, 1fr));
    gap: clamp(6px, 1.5vw, 8px);
    margin-bottom: 18px;
  }
  .meter {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    padding: clamp(6px, 1.5vw, 8px) 4px;
    text-align: center;
    min-width: 0;
  }
  .meter .label {
    font-size: clamp(7.5px, 2vw, 9px);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-dim);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .meter .val {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(14px, 3.5vw, 16px);
    font-weight: 700;
    margin-bottom: 5px;
  }
  .meter .bar {
    height: 4px;
    background: #25303C;
    border-radius: 2px;
    overflow: hidden;
  }
  .meter .bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s ease, background 0.4s ease;
  }

  /* TRAJECTORY BANNER */
  .trajectory {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(9.5px, 2.5vw, 11px);
    text-align: center;
    padding: 6px;
    border-radius: 6px;
    margin-bottom: 16px;
    letter-spacing: 0.04em;
  }
  .trajectory.thriving { background: rgba(61,220,132,0.12); color: var(--green); border: 1px solid rgba(61,220,132,0.3); }
  .trajectory.strained { background: rgba(245,166,35,0.12); color: var(--amber); border: 1px solid rgba(245,166,35,0.3); }
  .trajectory.failing { background: rgba(229,72,77,0.12); color: var(--red); border: 1px solid rgba(229,72,77,0.3); }

  /* SCENE PANEL */
  .scene {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 12px;
    padding: 0;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .scene .scene-image {
    width: 100%;
    aspect-ratio: 16/9;
    background: linear-gradient(135deg, #1A222C 0%, #20293400 100%), repeating-linear-gradient(45deg, #1A222C, #1A222C 10px, #1E2630 10px, #1E2630 20px);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 6px;
    border-bottom: 1px solid var(--panel-border);
    overflow: hidden;
  }
  .scene .scene-image.scene-image-real {
    background: #0D1117;
    padding: 0;
  }
  .scene .scene-image.scene-image-real img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .scene .scene-image .img-icon {
    font-size: clamp(18px, 5vw, 22px);
    opacity: 0.4;
  }
  .scene .scene-image .img-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(8px, 2vw, 9px);
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    text-align: center;
    padding: 0 12px;
  }
  .scene .scene-image .img-prompt-hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(7.5px, 1.8vw, 8.5px);
    color: #5A6776;
    max-width: 92%;
    text-align: center;
    line-height: 1.4;
    margin-top: 2px;
  }
  .scene .scene-body { padding: clamp(14px, 3.5vw, 20px); }
  .scene .scene-title {
    font-size: clamp(15px, 4vw, 17px);
    font-weight: 700;
    margin: 0 0 10px 0;
  }
  .scene .scene-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(9px, 2.2vw, 10px);
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .scene .scene-text {
    font-size: clamp(13.5px, 3.6vw, 14.5px);
    line-height: 1.55;
    color: #C8D2DC;
    margin-bottom: 4px;
  }
  .scene .scene-text p {
    margin: 0 0 12px 0;
  }
  .scene .scene-text p:last-child {
    margin-bottom: 0;
  }
  .scene.narrative-scene {
    border-color: rgba(79,168,232,0.35);
  }
  .scene.narrative-scene .scene-body {
    border-left: 2px solid rgba(79,168,232,0.4);
    padding-left: clamp(14px, 3.5vw, 20px);
  }
  .scene.form-scene {
    border-color: rgba(245,166,35,0.4);
    background: linear-gradient(180deg, rgba(245,166,35,0.04) 0%, var(--panel) 60px);
  }
  .scene.form-scene .scene-body {
    border-left: 2px solid rgba(245,166,35,0.5);
    padding-left: clamp(14px, 3.5vw, 20px);
  }
  .form-pending-card {
    margin-top: 16px;
    padding: clamp(16px, 4vw, 22px);
    background: rgba(245,166,35,0.06);
    border: 1px dashed rgba(245,166,35,0.45);
    border-radius: 10px;
    text-align: center;
  }
  .form-pending-icon {
    font-size: 22px;
    opacity: 0.7;
    margin-bottom: 6px;
  }
  .form-pending-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(10px, 2.6vw, 11px);
    letter-spacing: 0.06em;
    color: var(--amber);
    font-weight: 700;
    margin-bottom: 10px;
  }
  .form-pending-detail {
    font-size: clamp(12px, 3.2vw, 13px);
    color: #C8D2DC;
    line-height: 1.6;
    margin-bottom: 10px;
  }
  .form-pending-note {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(9.5px, 2.4vw, 10.5px);
    color: var(--text-dim);
    line-height: 1.5;
  }

  /* ---- Form launch card (pre-submission) ---- */
  .form-launch-card {
    margin-top: 16px;
    padding: clamp(16px, 4vw, 22px);
    background: rgba(245,166,35,0.06);
    border: 1px solid rgba(245,166,35,0.35);
    border-radius: 10px;
    text-align: center;
  }
  .form-launch-detail {
    font-size: clamp(12px, 3.2vw, 13px);
    color: #C8D2DC;
    line-height: 1.6;
    margin-bottom: 14px;
  }
  .form-open-btn {
    font-family: inherit;
    font-size: clamp(13px, 3.4vw, 14px);
    font-weight: 700;
    color: #1A1306;
    background: var(--amber);
    border: none;
    border-radius: 8px;
    padding: 12px 22px;
    cursor: pointer;
  }
  .form-open-btn:hover { filter: brightness(1.08); }

  /* ---- Form modal overlay ---- */
  .form-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(5,8,12,0.78);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: clamp(10px, 4vw, 24px);
  }
  .form-modal {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    width: min(720px, 96vw);
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .form-modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--panel-border);
  }
  .form-modal-header h2 {
    font-size: clamp(15px, 4vw, 18px);
    color: var(--amber);
    margin: 0;
  }
  .form-modal-close {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    padding: 4px 8px;
  }
  .form-modal-close:hover { color: var(--text); }
  .form-modal-body {
    padding: 18px 20px;
    overflow-y: auto;
    flex: 1;
  }
  .form-modal-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--panel-border);
    text-align: right;
  }
  .form-submit-btn {
    font-family: inherit;
    font-size: clamp(13px, 3.4vw, 14px);
    font-weight: 700;
    color: #06140C;
    background: var(--green);
    border: none;
    border-radius: 8px;
    padding: 11px 24px;
    cursor: pointer;
  }
  .form-submit-btn:hover { filter: brightness(1.08); }

  .form-field { margin-bottom: 18px; }
  .form-field-label {
    display: block;
    font-size: clamp(12px, 3.2vw, 13px);
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  .required-star { color: var(--red); }
  .form-text-input, .form-text-input-single {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: clamp(12px, 3.2vw, 13px);
    padding: 10px 12px;
    box-sizing: border-box;
    resize: vertical;
  }
  .form-text-input:focus, .form-text-input-single:focus, .form-table-input:focus {
    outline: none;
    border-color: var(--blue);
  }
  .form-input-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 8px;
  }
  .form-input-table th {
    font-size: clamp(10px, 2.6vw, 11px);
    color: var(--text-dim);
    text-align: left;
    padding: 6px 6px;
    border-bottom: 1px solid var(--panel-border);
  }
  .form-input-table td {
    padding: 3px;
  }
  .form-table-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    color: var(--text);
    font-family: inherit;
    font-size: clamp(11px, 2.8vw, 12px);
    padding: 7px 8px;
    box-sizing: border-box;
  }
  .form-add-row-btn {
    font-family: inherit;
    font-size: clamp(10.5px, 2.6vw, 11.5px);
    color: var(--blue);
    background: rgba(79,168,232,0.08);
    border: 1px solid rgba(79,168,232,0.3);
    border-radius: 6px;
    padding: 5px 12px;
    cursor: pointer;
  }
  .form-add-row-btn:hover { background: rgba(79,168,232,0.16); }

  /* Horizontal table: only used for <=3 columns. Scrolls on overflow
     rather than letting columns crush down past readable width. */
  .form-table-scroll {
    overflow-x: auto;
    margin-bottom: 8px;
    -webkit-overflow-scrolling: touch;
  }
  .form-table-delete-cell {
    width: 28px;
    padding: 3px 2px !important;
  }
  .form-row-delete-btn {
    background: rgba(229,72,77,0.1);
    border: 1px solid rgba(229,72,77,0.3);
    color: var(--red);
    border-radius: 6px;
    width: 26px;
    height: 26px;
    font-size: 12px;
    line-height: 1;
    cursor: pointer;
    flex-shrink: 0;
  }
  .form-row-delete-btn:hover { background: rgba(229,72,77,0.2); }

  /* Stacked-card layout: used for any table with 4+ columns, where a
     real horizontal table becomes too cramped to type into on a phone
     screen. Each row becomes its own card with one labeled field per
     line, full width, instead of squeezed side-by-side columns. */
  .form-stacked-table {
    margin-bottom: 8px;
  }
  .form-stacked-row {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 10px;
  }
  .form-stacked-row-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .form-stacked-row-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    color: var(--amber);
    font-weight: 700;
    letter-spacing: 0.03em;
  }
  .form-stacked-cell {
    margin-bottom: 8px;
  }
  .form-stacked-cell:last-child {
    margin-bottom: 0;
  }
  .form-stacked-cell-label {
    display: block;
    font-size: 10.5px;
    color: var(--text-dim);
    margin-bottom: 3px;
  }

  /* ---- Feedback card (post-submission) ---- */
  .form-feedback-card {
    margin-top: 16px;
    padding: clamp(16px, 4vw, 22px);
    border-radius: 10px;
    text-align: center;
  }
  .form-feedback-card.tier-strong { background: rgba(61,220,132,0.08); border: 1px solid rgba(61,220,132,0.4); }
  .form-feedback-card.tier-solid { background: rgba(61,220,132,0.05); border: 1px solid rgba(61,220,132,0.25); }
  .form-feedback-card.tier-adequate { background: rgba(245,166,35,0.06); border: 1px solid rgba(245,166,35,0.3); }
  .form-feedback-card.tier-weak { background: rgba(229,72,77,0.06); border: 1px solid rgba(229,72,77,0.3); }
  .form-feedback-card.tier-incomplete { background: rgba(229,72,77,0.1); border: 1px solid rgba(229,72,77,0.45); }
  .feedback-score {
    font-size: clamp(28px, 7vw, 34px);
    font-weight: 800;
    color: var(--text);
  }
  .feedback-score-max {
    font-size: clamp(14px, 3.6vw, 16px);
    color: var(--text-dim);
    font-weight: 500;
  }
  .feedback-meters {
    margin: 10px 0;
  }
  .meter-change {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(10px, 2.6vw, 11px);
    padding: 4px 10px;
    border-radius: 6px;
    margin: 2px 4px;
  }
  .meter-change.meter-up { background: rgba(61,220,132,0.12); color: var(--green); }
  .meter-change.meter-down { background: rgba(229,72,77,0.12); color: var(--red); }
  .meter-change.meter-flat { background: rgba(138,153,168,0.12); color: var(--text-dim); }
  .feedback-strengths, .feedback-weaknesses {
    font-size: clamp(11.5px, 3vw, 12.5px);
    line-height: 1.6;
    margin-top: 8px;
    text-align: left;
  }
  .feedback-strengths { color: var(--green); }
  .feedback-weakness-heading {
    font-size: clamp(11.5px, 3vw, 12.5px);
    font-weight: 700;
    color: var(--amber);
    margin-bottom: 6px;
  }
  .feedback-weakness-item {
    margin-bottom: 10px;
    padding: 8px 10px;
    background: rgba(245,166,35,0.05);
    border-left: 2px solid rgba(245,166,35,0.4);
    border-radius: 4px;
  }
  .feedback-weakness-label {
    font-size: clamp(11.5px, 3vw, 12.5px);
    font-weight: 600;
    color: var(--amber);
    margin-bottom: 3px;
  }
  .feedback-weakness-hint {
    font-size: clamp(11px, 2.8vw, 12px);
    color: #C8D2DC;
    line-height: 1.55;
  }

  .form-reaction-card {
    margin-top: 14px;
    padding: 14px 16px;
    background: rgba(79,168,232,0.05);
    border-left: 2px solid rgba(79,168,232,0.4);
    border-radius: 4px;
  }
  .form-reaction-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--blue);
    margin-bottom: 6px;
  }
  .form-reaction-text {
    font-size: clamp(12.5px, 3.2vw, 13.5px);
    line-height: 1.6;
    color: #DCE4EC;
    font-style: italic;
  }

  .choice-btn.continue-btn {
    justify-content: center;
    background: rgba(79,168,232,0.1);
    border-color: rgba(79,168,232,0.4);
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .choice-btn.continue-btn:hover {
    background: rgba(79,168,232,0.18);
  }
  .scene .placeholder-tag {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(8px, 2vw, 9px);
    color: var(--blue);
    background: rgba(79,168,232,0.1);
    border: 1px solid rgba(79,168,232,0.3);
    border-radius: 4px;
    padding: 2px 6px;
    margin-top: 8px;
  }

  /* CHOICES */
  .choices {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .choice-btn {
    background: #1C252F;
    border: 1px solid var(--panel-border);
    color: var(--text);
    text-align: left;
    padding: clamp(12px, 3vw, 13px) clamp(12px, 3vw, 14px);
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: clamp(13px, 3.4vw, 13.5px);
    cursor: pointer;
    transition: all 0.15s ease;
    line-height: 1.45;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    min-height: 44px;
    width: 100%;
  }
  .choice-btn:hover {
    background: #232E3A;
    border-color: var(--blue);
  }
  .choice-btn .choice-letter {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(10px, 2.6vw, 11px);
    font-weight: 700;
    color: var(--text-dim);
    flex-shrink: 0;
    margin-top: 1px;
  }
  .choice-btn.unconventional {
    border-color: rgba(245,166,35,0.4);
    background: rgba(245,166,35,0.06);
  }
  .choice-btn.unconventional .choice-letter { color: var(--amber); }

  /* ENDING */
  .ending-panel {
    text-align: center;
    padding: clamp(22px, 6vw, 30px) clamp(16px, 4vw, 20px);
  }
  .ending-panel .tier-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(10.5px, 2.8vw, 12px);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }
  .ending-panel.thriving .tier-label { color: var(--green); }
  .ending-panel.strained .tier-label { color: var(--amber); }
  .ending-panel.failing .tier-label { color: var(--red); }
  .ending-panel h2 { font-size: clamp(17px, 4.5vw, 20px); margin: 0 0 14px 0; }
  .restart-btn {
    background: var(--blue);
    color: #0F1419;
    border: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-weight: 600;
    font-size: clamp(13px, 3.4vw, 14px);
    cursor: pointer;
    margin-top: 10px;
    min-height: 44px;
  }
  .review-btn {
    background: transparent;
    color: var(--blue);
    border: 1px solid var(--blue);
    padding: 12px 24px;
    border-radius: 8px;
    font-weight: 600;
    font-size: clamp(13px, 3.4vw, 14px);
    cursor: pointer;
    margin-top: 10px;
    margin-right: 8px;
    min-height: 44px;
  }
  .scene.review-scene {
    border-color: rgba(61,220,132,0.3);
  }
  .review-intro {
    font-size: clamp(12px, 3.2vw, 13px);
    color: var(--text-dim);
    line-height: 1.5;
    margin-bottom: 16px;
  }
  .review-empty {
    text-align: center;
    padding: 24px 12px;
    color: var(--text-dim);
    font-size: clamp(13px, 3.4vw, 14px);
  }
  .review-item {
    display: flex;
    gap: 12px;
    padding: 14px 0;
    border-top: 1px solid var(--panel-border);
  }
  .review-item:first-of-type {
    border-top: none;
  }
  .review-item-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--amber);
    flex-shrink: 0;
    width: 22px;
  }
  .review-item-title {
    font-weight: 700;
    font-size: clamp(13px, 3.4vw, 14px);
    margin-bottom: 6px;
  }
  .review-item-row {
    font-size: clamp(12px, 3.2vw, 13px);
    line-height: 1.5;
    margin-bottom: 4px;
    color: #C8D2DC;
  }
  .review-item-row.review-better {
    color: var(--green);
  }
  .review-item-deltas {
    margin: 4px 0 8px 0;
  }
  .review-label {
    font-family: 'JetBrains Mono', monospace;

// ============================================================
// CLOUD SAVE / RESUME — Supabase-backed progress persistence.
// Students identify themselves with name + PIN (studentKey), which lets
// progress follow them across devices, since a plain iframe embed in the
// LMS gives no student identity to the page on its own.
// ============================================================
const SUPABASE_URL = "https://xdwhhqygiyjbexinrgal.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhkd2hocXlnaXlqYmV4aW5yZ2FsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5NDQxNDMsImV4cCI6MjA5ODUyMDE0M30.BWts3AmPDVbJmpOY_5AwOo0ZJ4YRURcd3tPOKoFwdZs";
const SUPABASE_TABLE = "byoa_progress";

let studentKey = null; // set once the student enters name+PIN
let cloudSaveInFlight = false; // prevents overlapping save requests
let cloudSaveQueued = false;   // if a save comes in while one's in flight, queue one more

function makeStudentKey(name, pin) {
  const cleanName = (name || "").trim().toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
  const cleanPin = (pin || "").trim().toLowerCase().replace(/[^a-z0-9]/g, "");
  return `${cleanName}-${cleanPin}`;
}

function serializeGameState() {
  return {
    playerName,
    state,
    currentBeatId,
    history,
    decisionLog,
    formSubmissions,
  };
}

function applyLoadedGameState(saved) {
  if (!saved) return;
  playerName = saved.playerName || playerName;
  state = saved.state || { ...START_STATE };
  currentBeatId = saved.currentBeatId || "N_F1";
  history = saved.history || [];
  decisionLog = saved.decisionLog || [];
  formSubmissions = saved.formSubmissions || {};
  // transient UI state always starts closed/false regardless of save
  reviewMode = false;
  portfolioMode = false;
  activeFormBeatId = null;
  activeFormTableRows = {};

// Fetches saved progress for a student key. Returns the parsed game_state
// object, or null if no save exists yet (new student) or on any error
// (network issue, RLS misconfiguration, etc — fails safe into "start fresh"
// rather than blocking the student from playing).
async function loadCloudProgress(key) {
  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 4000); // don't hang the start screen indefinitely on a slow/unreachable connection
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?student_key=eq.${encodeURIComponent(key)}&select=game_state`,
      {
        headers: {
          "apikey": SUPABASE_ANON_KEY,
          "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
        },
        signal: controller.signal,
      }
    );
    clearTimeout(timeoutId);
    if (!res.ok) return null;
    const rows = await res.json();
    if (!rows || rows.length === 0) return null;
    return rows[0].game_state || null;
  } catch (err) {
    console.warn("Cloud progress load failed or timed out, starting fresh:", err);
    return null;
  }
}

// Upserts current progress under the student's key. Fire-and-forget from
// the caller's perspective — gameplay never waits on this. If a save is
// already in flight when another is requested, one more save is queued
// (not stacked infinitely) so rapid clicking doesn't spam requests.
async function saveCloudProgress() {
  if (!studentKey) return;
  if (cloudSaveInFlight) {
    cloudSaveQueued = true;
    return;
  }
  cloudSaveInFlight = true;
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}`, {
      method: "POST",
      headers: {
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
        "Content-Type": "application/json",
        "Prefer": "resolution=merge-duplicates",
      },
      body: JSON.stringify({
        student_key: studentKey,
        player_name: playerName,
        game_state: serializeGameState(),
        updated_at: new Date().toISOString(),
      }),
    });
  } catch (err) {
    console.warn("Cloud save failed (progress kept locally in this session):", err);
  } finally {
    cloudSaveInFlight = false;
    if (cloudSaveQueued) {
      cloudSaveQueued = false;
      saveCloudProgress();
    }
  }
}

async function deleteCloudProgress() {
  if (!studentKey) return;
  try {
    await fetch(
      `${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?student_key=eq.${encodeURIComponent(studentKey)}`,
      {
        method: "DELETE",
        headers: {
          "apikey": SUPABASE_ANON_KEY,
          "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
        },
      }
    );
  } catch (err) {
    console.warn("Cloud delete failed:", err);
  }
}

const START_STATE = { budget: 70, schedule: 70, trust: 70, quality: 70, risk: 30 };

function meterColor(key, val) {
  const bad = key === "risk" ? val >= 65 : val <= 35;
  const warn = key === "risk" ? val >= 45 : val <= 55;
  if (bad) return "var(--red)";
  if (warn) return "var(--amber)";
  return "var(--green)";
}

function getTrajectory(state) {
  const core = ["budget", "schedule", "trust", "quality"];
  const criticalCount = core.filter(k => state[k] <= 25).length;
  if (criticalCount >= 2 || state.risk >= 80) return "failing";
  const healthyCount = core.filter(k => state[k] >= 60).length;
  if (healthyCount === 4 && state.risk <= 40) return "thriving";
  return "strained";
}

function clamp(v) { return Math.max(0, Math.min(100, v)); }

let playerName = "";
let state = { ...START_STATE };
let currentBeatId = "N_F1";
let history = [];
let decisionLog = [];
let reviewMode = false;
let portfolioMode = false;

function buildReviewItems() {
  // Only include decisions where a BEST_CHOICES entry exists AND the player's
  // pick didn't match the authored best index. Decisions with no authored
  // entry yet are silently skipped (not shown as "correct" or "wrong").
  const items = [];
  for (const entry of decisionLog) {
    const key = `${entry.beatId}::${entry.tier}`;
    const best = BEST_CHOICES[key];
    if (!best) continue; // not yet authored — skip rather than guess
    if (entry.choiceIndex === best.bestIndex) continue; // they got it right
    const beat = BEATS[entry.beatId];
    if (!beat) continue;
    const variant = beat.branchByTier ? beat.variants[entry.tier] : beat;
    if (!variant || !variant.choices) continue;
    // Look up the actual meter consequence of the choice the student made,
    // so the review can show not just "this was weaker" but exactly what
    // it cost — closing the loop between decision and outcome.
    const deltaKey = `${entry.beatId}::${entry.tier}::${entry.choiceIndex}`;
    const actualDelta = HIDDEN_DELTAS[deltaKey] || {};
    items.push({
      beatTitle: beat.title,
      yourChoice: variant.choices[entry.choiceIndex] ? variant.choices[entry.choiceIndex].label : "(unknown)",
      betterChoice: variant.choices[best.bestIndex] ? variant.choices[best.bestIndex].label : "(unknown)",
      explanation: best.explanation,
      actualDelta,
    });
  }
  return items;
}

function meterDeltaChipsHTML(delta) {
  const entries = Object.entries(delta || {});
  if (entries.length === 0) return "";
  return entries.map(([meter, val]) => {
    const sign = val > 0 ? "+" : "";
    const cls = val > 0 ? "meter-up" : val < 0 ? "meter-down" : "meter-flat";
    return `<span class="meter-change ${cls}">${meter}: ${sign}${val}</span>`;
  }).join(" ");
}

function reviewScreenHTML() {
  const items = buildReviewItems();
  const authoredCount = decisionLog.filter(e => BEST_CHOICES[`${e.beatId}::${e.tier}`]).length;
  const body = items.length === 0
    ? `<div class="review-empty">${authoredCount === 0
        ? "Review content for this track is still being authored — check back soon."
        : "Nice work — across every reviewed decision, you picked the strongest available option."}</div>`
    : items.map((it, i) => `
        <div class="review-item">
          <div class="review-item-num">${i + 1}</div>
          <div class="review-item-body">
            <div class="review-item-title">${it.beatTitle}</div>
            <div class="review-item-row"><span class="review-label">You chose:</span> ${it.yourChoice}</div>
            <div class="review-item-deltas">${meterDeltaChipsHTML(it.actualDelta)}</div>
            <div class="review-item-row review-better"><span class="review-label">Stronger option:</span> ${it.betterChoice}</div>
            <div class="review-item-explain">${it.explanation}</div>
          </div>
        </div>
      `).join("");

  return `
    <div class="header"><h1>BYOA — Predictive Track</h1><span class="fa-badge">DECISION REVIEW</span></div>
    <div class="scene review-scene">
      <div class="scene-body">
        <div class="scene-title">Where a Stronger Choice Existed</div>
        <div class="review-intro">This reviews only the decisions where a clearly stronger option was available. Decisions you handled well aren't repeated here.</div>
        ${body}
        <button class="restart-btn" onclick="hideReview()">Back to Ending</button>
      </div>
    </div>
  `;
}

function showReview() {
  reviewMode = true;
  render();
}

function hideReview() {
  reviewMode = false;
  render();
}

function portfolioScreenHTML() {
  const submissions = Object.entries(formSubmissions).map(([beatId, sub]) => ({ beatId, ...sub }));

  if (submissions.length === 0) {
    return `
      <div class="header"><h1>BYOA — Predictive Track</h1><span class="fa-badge">DOCUMENT PORTFOLIO</span></div>
      <div class="scene review-scene">
        <div class="scene-body">
          <div class="scene-title">Document Portfolio Review</div>
          <div class="review-empty">No project artifacts were submitted during this run.</div>
          <button class="restart-btn" onclick="hidePortfolio()">Back to Ending</button>
        </div>
      </div>
    `;
  }

  const sorted = [...submissions].sort((a, b) => a.score - b.score);
  const avgScore = Math.round(submissions.reduce((sum, s) => sum + s.score, 0) / submissions.length);

  const itemsHTML = sorted.map((s, i) => {
    const tierClass = s.score >= 85 ? "tier-strong"
      : s.score >= 70 ? "tier-solid"
      : s.score >= 50 ? "tier-adequate"
      : s.score >= 30 ? "tier-weak"
      : "tier-incomplete";
    const weaknessHTML = s.weaknesses.length
      ? `<div class="portfolio-item-weakness"><strong>Biggest gap:</strong> ${s.weaknesses[0]}</div>`
      : `<div class="portfolio-item-clean">No significant gaps identified.</div>`;
    return `
      <div class="portfolio-item ${tierClass}">
        <div class="portfolio-item-score">${s.score}</div>
        <div class="portfolio-item-body">
          <div class="portfolio-item-title">${s.artifactName}</div>
          ${weaknessHTML}
        </div>
      </div>
    `;
  }).join("");

  return `
    <div class="header"><h1>BYOA — Predictive Track</h1><span class="fa-badge">DOCUMENT PORTFOLIO</span></div>
    <div class="scene review-scene">
      <div class="scene-body">
        <div class="scene-title">Document Portfolio Review</div>
        <div class="review-intro">${submissions.length} project artifact${submissions.length === 1 ? "" : "s"} submitted, averaging ${avgScore}/100. Sorted weakest first so you can see what to focus on.</div>
        ${itemsHTML}
        <button class="restart-btn" onclick="hidePortfolio()">Back to Ending</button>
      </div>
    </div>
  `;
}

function showPortfolio() {
  portfolioMode = true;
  render();
}

function hidePortfolio() {
  portfolioMode = false;
  render();
}

function resolveBeat(beatId) {
  const beat = BEATS[beatId];
  if (!beat) return null;
  if (!beat.branchByTier) {
    return { ...beat, _resolvedText: beat.text, _resolvedChoices: beat.choices, _resolvedImagePrompt: beat.imagePrompt, _resolvedTier: "base" };
  }
  const tier = getTrajectory(state);
  const variant = beat.variants[tier] || beat.variants.strained || beat.variants.thriving;
  const actualTier = beat.variants[tier] ? tier : (beat.variants.strained ? "strained" : "thriving");
  return { ...beat, _resolvedText: variant.text, _resolvedChoices: variant.choices, _resolvedImagePrompt: variant.imagePrompt, _resolvedTier: actualTier };
}

function applyDelta(delta) {
  for (const k in delta) {
    state[k] = clamp(state[k] + delta[k]);
  }
}

// Deltas are hand-authored per choice based on what each choice actually

  "UN1::base::0": { budget: -4, schedule: -2, trust: +5 },

  "PR2::base::1": { schedule: +2, risk: +6 },
  "PR2::base::2": { budget: -2, schedule: -1, risk: -4 },
  "P3d::base::0": { quality: +3, schedule: -2, budget: -1 },
  "P3d::base::1": { quality: -1, risk: +2 },
  "P3d::base::2": { quality: -2, risk: +4, schedule: +1 },
  "HL2::base::0": { trust: +4, budget: +1 },
  "HL2::base::1": { quality: +1, trust: +1 },
  "HL2::base::2": { trust: +1, quality: +1, schedule: -1 },

  "I1::base": { bestIndex: 0, explanation: "Progressive elaboration is a real principle — charters are expected to start light on detail and get refined through planning — but it applies to scope and requirement detail, not to the charter's core authorizing function. Success criteria and named sponsor authority aren't details to fill in later; they're the two things a charter exists to establish in the first place, and without them there's no real basis for the PM to later defend a decision or push back on scope creep. Naming that gap to Renata before the board meeting addresses the actual missing piece. Taking the charter as a trigger to begin and refine missing detail through planning conflates the two kinds of gap: it correctly treats requirement detail as something to elaborate, but wrongly extends that same logic to the authorizing elements, which never get progressively elaborated because nothing downstream creates them if they weren't there at the start. Drafting supporting plans in parallel while only verbally flagging the gap to Renata makes the same mistake in a softer form — it produces real planning artifacts built on a charter that still doesn't establish what success means or who has authority to decide it." },
  "I2::base": { bestIndex: 2, explanation: "Marcus already heard the real math once, in this same conversation, and responded by explicitly delegating the gap rather than asking to hear it again — 'however you want to plan it underneath, that's your call.' Repeating the same direct statement he just heard and already moved past doesn't add new information; it ignores the signal he gave that this specific conversation is closed on his end. The actual risk in his delegation is that it's ambiguous: it could mean he genuinely accepts a different real plan, or it could mean he still believes the full date is happening while the PM quietly plans around something else — which is exactly the kind of misalignment that surfaces later as a baseline nobody agreed to. Proposing a phased launch directly to Marcus resolves that ambiguity in the open: it uses the authority he just handed over while making sure he explicitly knows and agrees to what the real plan actually is, rather than letting him walk away assuming the original date still holds. Accepting the delegation quietly and planning around the real numbers without raising it again avoids the redundant conversation but creates exactly that hidden gap — Marcus continues believing one thing while the PM privately works toward another, which is a problem this project can't afford to set up this early." },
  "F_U1::base": { bestIndex: 2, explanation: "Marisol's actual complaint is about companies that made specific promises and then couldn't deliver on them — and Soren genuinely hasn't decided its staffing model yet, which means committing to a union shop and prevailing wage right now isn't decisiveness, it's a real commitment made before any resourcing plan exists to back it up. If that commitment later turns out to be wrong, it becomes exactly the broken promise she described being burned by, manufactured in this exact conversation. Telling her it isn't decided and you'll follow up gives her nothing to work with and, given that she just explained why vague non-answers specifically bother her, reproduces the very pattern she said she's tired of. Asking her directly what she'd need to see treats her stated experience as real input into a decision that's still genuinely open, rather than either overcommitting to something unplanned or deflecting a direct question with a vague deferral." },
  "F_C1::base": { bestIndex: 0, explanation: "Tom drafting an enthusiastic reply before any real evaluation happens risks committing the project, implicitly, to a second product line nobody has costed, engineered, or scheduled — that risk is real and not arguable. The less obvious distinction is between stopping any reply entirely versus sending a careful, hedged one personally: even a measured, non-committal acknowledgment is still an external signal to a company actively evaluating manufacturers for a multi-year contract, and that signal gets read as engagement regardless of how cautious its wording is. Soren's actual internal position right now is genuinely undecided — sending anything, even a hedge, represents a position that doesn't exist yet. Holding off entirely until a real evaluation happens is the only option that doesn't communicate externally about scope the company hasn't internally assessed." },
  "F_C3::base": { bestIndex: 2, explanation: "Hollis's own email said they're evaluating two or three manufacturers — they haven't committed to Soren any more than Soren has committed to them. Requesting a non-binding letter of intent matches that level of mutual non-commitment while gathering real information about how serious they actually are, before Soren puts anything about its own future roadmap on the record. Telling Hollis that Soren will revisit agricultural variants in a later phase sounds measured, but it commits Soren to a specific future plan based on zero real information about whether Hollis is a serious enough prospect to justify that commitment — it's not a strawman, it's a real promise made before there's any evidence it's worth making. Saying yes now and expanding scope immediately makes the same mistake more severely, embedding a second, fully different airframe class into the roadmap before the current product has even shipped." },
  "P0a::base": { bestIndex: 0, explanation: "Adapting a past template isn't inherently lazy — reusing proven structure is normal practice — but a generic template was built around a generic problem, and the actual gap here is specific: two co-founders, functionally equal in authority, with no established referee for a disagreement about the product's basic identity. A borrowed template's change-control section typically routes disputes to a sponsor or PM approval step, which doesn't address the real question of who breaks a tie between two people neither of whom outranks the other. Writing the plan to explicitly name that tie-breaking authority solves the problem I3 already flagged as the one most likely to quietly sink the schedule. Leaving it informal defers that same authority question until the middle of an active Priya-Tom disagreement, which is the worst possible moment to be inventing a decision process for the first time." },
  "P1::base": { bestIndex: 0, explanation: "The two positions aren't equally evidenced: Tom has a real, signed-adjacent customer on a real date with patience that's already eroding monthly, while Priya's three-variant vision is a genuine, well-reasoned market thesis with no committed customer behind it yet. Scoping to one variant builds against the option with external confirmation, while leaving the door open to revisit the thesis-based markets once there's revenue and proof of execution to fund them. Approving all three variants in parallel isn't bold risk tolerance so much as committing to a resource consumption rate the project has already shown, through Marcus's own unrealistic timeline, it can't sustain for even one variant cleanly. Splitting to two variants that share components looks like a reasonable compromise, but it's the conflict-mediation version of solutioning by relationship-smoothing rather than evidence — it doesn't actually deliver what Tom's customer specifically needs, and it doesn't validate Priya's agricultural thesis either, so it satisfies the appearance of compromise without resolving either person's actual, evidenced concern." },
  "PT1::base": { bestIndex: 2, explanation: "Priya's claim that the additional investment is 'modest' and 'doesn't undo the decision' is a real engineering feasibility and cost claim, but it's also being made by someone with a direct stake in the outcome — she's not a neutral source on whether her own pitch is actually as modest as she's framing it. Felix, who has to build whichever design gets chosen and who notably said nothing in the original scope meeting, is the available, technically-qualified, non-interested voice who could actually verify the claim before any resources move. Approving the investment immediately means accepting an interested party's characterization of cost and risk with no independent check. Declining outright dismisses a technically substantive argument based on its timing and political context rather than on whether it's actually accurate — which forecloses a possibly sound option without ever finding out if it was one." },
  "P1b::base": { bestIndex: 0, explanation: "Individual interviews are a legitimate elicitation technique in general — they're often faster and reduce groupthink — but they work best when the inputs being gathered are independent. Here, the scene already establishes that Tom's customer requirements, Priya's engineering constraints, and Dr. Osei's regulatory limits are in active tension before anyone has gathered them formally. Collecting known-conflicting requirements separately doesn't avoid that conflict, it just postpones discovering it to a second, separate reconciliation step — doing the same conflict-resolution work twice instead of once. A structured workshop resolves the tradeoffs in real time, with everyone who holds a piece of the conflict in the room together. Having engineering draft requirements unilaterally and circulate for sign-off skips stakeholder input on the front end entirely, letting one party define the requirements that the others are only asked to react to after the fact." },
  "P8::thriving": { bestIndex: 0, explanation: "When a sourcing decision involves passenger or operator safety, cost should not be the deciding factor unless the safety difference between options is genuinely immaterial — and here it wasn't. Selecting the cheaper supplier despite a real safety gap exposes the project to liability and reputational risk that almost always outweighs the short-term budget savings, especially once due-diligence expectations under FAA scrutiny are considered." },
  "E6::failing": { bestIndex: 0, explanation: "The symptom isn't an ambiguous maybe — it specifically matches the early description from an actual competitor recall, a known dangerous pattern, which is why Felix and the technician are reluctant to even say the word out loud. Given that specific match, the asymmetry of harm matters: under-reacting to a real thermal risk that's already shown up in units risks genuine harm if it's real, while over-reacting to what turns out to be benign discoloration costs comparatively little. Self-reporting to the FAA and halting shipments preemptively is the response sized to that asymmetry. An internal stop-ship while investigating is real and meaningfully better than doing nothing, but delaying the regulatory disclosure to investigate internally first risks Soren being the company that recognized a pattern matching a known recall and didn't disclose it promptly if the finding turns out to be serious. Quietly investigating without halting anything keeps shipping units while a signal this specific sits unaddressed." },
  "P2::thriving": { bestIndex: 0, explanation: "The scene already tells you the WBS has reached the right stopping point: work packages small enough that someone can be held accountable for one by name is the actual textbook criterion for 'decomposed enough' — not a placeholder level waiting for more detail. Treating it as baselined and moving into sequencing is simply the next correct step once that criterion is met. Holding the WBS hostage to a full risk assessment gets the sequence backwards: risk assessment is a parallel planning activity that takes the WBS as an input, identifying and analyzing risks against work packages that already exist — it doesn't gate the WBS's own completion, and treating it as a precondition stalls the schedule for a dependency that was never real. Decomposing the safety-critical branches one level further makes a different mistake: it reaches for the scope-decomposition tool to solve a risk-management problem. Once a WBS has hit its correct stopping point, the way to address elevated concern about a specific branch is through risk planning or a design review, not by over-decomposing the work breakdown itself past the point where the pieces are independently meaningful." },
  "P2::strained": { bestIndex: 0, explanation: "Working the ambiguity directly with the people who actually hold the missing information — Felix on the avionics fragmentation, the certification lead on the Part 107 question — resolves the root cause at the level closest to the problem, which is the principle behind servant leadership and problem-solving: push decisions down to where the expertise lives before pushing them up. Escalating straight to Marcus for a same-day ruling skips that step; it treats a technical-scope question as a sponsor-level decision before the team has even tried to answer it themselves, which both under-uses the people who actually know the answer and trains the team to escalate instead of resolve. Building the WBS around the fuzziness and refining later isn't unreasonable as a general philosophy — some ambiguity is normal and gets clarified through progressive elaboration — but doing it here, on branches already flagged as actively contested, just relocates today's ambiguity into tomorrow's schedule and budget, where it costs more to unwind." },
  "FX1::base": { bestIndex: 0, explanation: "An engineer flagging a structural risk this early, unprompted, and while it's still cheap to address, is exactly the signal a risk management process exists to act on. Deferring it for later review risks losing the moment when the fix is genuinely inexpensive; asking Felix to quantify it with hard numbers before allocating any resources adds friction to a credible expert judgment call and risks the same dynamic that erodes his trust later in the project." },
  "P2b::base": { bestIndex: 0, explanation: "Renata's request happens to match the objectively right tool here, but the reason it's correct isn't that she's the VP — it's that this project's actual structure (multiple long-lead, parallel workstreams with very different durations, several outside anyone's direct control) is precisely the situation critical-path methodology exists for: knowing which specific delay actually moves the end date versus which one is absorbed by slack elsewhere. A milestone-based approach can confirm whether a date was hit, but it doesn't surface dependency relationships, so it can't tell you whether a two-week equipment slip threatens the launch date or gets absorbed harmlessly — exactly the distinction Renata is asking for and exactly what this project's dependency structure requires. Mirroring the company's last capital project imports a methodology without knowing whether that project had a similar dependency structure at all; reusing an approach is only sound when the fact pattern actually matches; here nothing establishes that it does." },
  "P3::thriving": { bestIndex: 0, explanation: "By this point the requirements have already been reconciled with Dr. Osei's regulatory constraints and the scope baseline has already been formally locked — the spec instability that waiting for final spec lock is trying to protect against has already been resolved upstream, which makes that option a redundant check rather than real caution. The schedule has also already confirmed that certification, not equipment, is the actual long pole here, meaning there's no real opportunity cost to building in extra margin while it's cheap to add. Ordering now with extra buffer is the only option that actively adds protection — against future supply shocks like the one that hits this exact vendor category in the strained version of this same decision — at a moment when that protection costs almost nothing. Ordering only the long-lead items and deferring the rest doesn't reduce any risk that's actually been identified; it just delays a decision that comfortable float already supports making now." },
  "P3::strained": { bestIndex: 2, explanation: "A twenty-two-week lead time that pushes past the committed date is a genuine schedule risk that needs a real solution, not just an expensive workaround or passive acceptance. Looking for a secondary vendor with faster turnaround directly addresses the root cause without the open-ended cost of rush fees or the schedule slippage of simply accepting the delay outright." },
  "PR2::base": { bestIndex: 2, explanation: "A vendor liability cap that shifts real risk onto Soren deserves pushback, but an extended schedule delay over contract terms on equipment this central to the whole operation isn't free either. Negotiating a narrower middle position — accepting some risk transfer in exchange for a real concession like extended warranty coverage — protects the project without gambling the timeline on an all-or-nothing negotiating stance." },
  "P3d::base": { bestIndex: 0, explanation: "Final inspection is a real, legitimate quality control function, not a worthless one — but on a product Dr. Osei has already made clear can't rely on 'good enough on average,' a defect that survives all the way to final inspection has already consumed full manufacturing cost, and some structural issues genuinely aren't visible in a finished, assembled unit the way they would be in raw material or mid-process. Investing in statistical process control and tighter incoming specs now catches problems earlier, when they're both cheaper to fix and easier to actually detect — the real cost-of-quality principle, not just a preference for more process. Deferring formal quality planning entirely leaves both the cost and detectability problems fully exposed on equipment this expensive and a product this safety-relevant, which is the most exposed of the three positions, not a neutral one." },
  "P3b::base": { bestIndex: 0, explanation: "Earned value tracking matches Dana's stated request, but the independent reason it's correct is the project's actual spend pattern: equipment, construction, and certification fees land in uneven bursts rather than smoothly over time. A simple budget-versus-actual comparison can look fine while large committed-but-unspent costs are about to land, or look alarming for reasons that are purely timing rather than real performance — earned value specifically separates planned value, completed work, and actual cost, which is what actually distinguishes real cost problems from timing noise under this kind of spend pattern. Delegating the framework entirely to Dana isn't wrong because delegation is bad in general — division of labor is normal — but this decision is explicitly framed as something PM and finance need to agree on jointly, and a PM who checks out of it loses the working knowledge needed to interpret cost performance directly later, rather than translating every budget conversation with Marcus through Dana first." },
  "P3c::base": { bestIndex: 0, explanation: "The quotes don't just vary, they vary widely enough that the PM has to double-check they're quoting the same specification — that's real evidence of genuine uncertainty, not noise to be ignored. Three-point estimating is the method built for exactly this situation: modeling optimistic, likely, and pessimistic values captures the actual spread the project already has data for, rather than pretending one point represents it. Using the most recent quote discards the real variance the project just observed in favor of one arbitrary data point; benchmarking against another company's facility reaches outside for a number from a build with no established comparability — different equipment, scale, and a drone-specific regulatory environment that generic facility benchmarks wouldn't capture — when the project already has its own real, if noisy, vendor data in hand." },
  "P4::thriving": { bestIndex: 0, explanation: "Adding a reserve here isn't caution for its own sake — by this point in the story, the FAA timeline and the battery supplier decision are both still genuinely open and unresolved, real identified exposure rather than abstract risk-aversion. Good news on this round of costs doesn't retire either of those. Keeping the budget lean to impress the board removes the buffer meant to absorb that exposure for a purely perception-driven reason, while the actual uncertainty hasn't gone anywhere. Splitting a contingency between equipment and labor skips a step that has to come first: the total reserve amount hasn't even been set yet at this point, so dividing it between categories is solving an allocation question before the sizing question it depends on." },
  "P4::strained": { bestIndex: 0, explanation: "The fifteen percent overage has a specific, verified root cause — the building's existing electrical service couldn't support the planned upgrade at the originally assumed cost — and that's exactly the kind of finding that needs to reach Marcus now, while it's still early and still explainable, rather than getting quietly absorbed into a baseline he'll later sign off on assuming it holds together. Cutting the contingency reserve to cover it spends the buffer meant for risks that haven't materialized yet on the very first known issue that has — defeating the reserve's actual purpose this early in the project. Re-scoping equipment specs targets the wrong driver entirely: the overage came from the building's electrical capacity, not from anything about the equipment itself, so cutting equipment specs wouldn't even address the cost that's actually driving the variance." },
  "DN2::base": { bestIndex: 0, explanation: "The estimate was already scrubbed for defensible accuracy in the prior session — Dana explicitly said it was close enough to defend and that she was willing to stand behind it in front of the board. Going looking again for a 'genuine, defensible way' to bring it down further searches for slack that the careful estimating process just completed would already have found if it existed; it's checking a control that was just satisfied, dressed up as a fresh option. Marcus has also just visibly handed the PM the referee role in this specific disagreement — staying neutral declines a role that was just explicitly granted, rather than being appropriately diplomatic. Backing Dana's number and helping Marcus understand why it has to stay real is the only option that doesn't either re-litigate work that was just finished or decline the authority just handed over." },
  "P4b::base": { bestIndex: 0, explanation: "The scene's own complaint about Dr. Osei's whiteboard list isn't that it's informal, it's specific: a list doesn't say who owns each risk, how often it gets reviewed, or what triggers escalation. Building a formal plan with defined probability and impact scales directly answers that complaint. Keeping risk management lightweight and reactive doesn't address it at all — it just waits for the same unowned, unreviewed risks to surface as surprises later. Adapting a framework from a past regulated manufacturing project might bring real domain experience, but that framework was built around a different project's people and ownership structure, not Soren's — and the specific gap this scene identifies is about ownership and escalation mapping onto the actual people on this project (Osei, Felix, Diego, Dana), which a borrowed framework wasn't built to do." },
  "P5::thriving": { bestIndex: 0, explanation: "Priya just surfaced two real, previously unidentified engineering risks live in the workshop — a single-source connector and an unstable flight-control library — which is exactly the kind of finding the formal framework built one beat earlier exists to capture. Noting them informally instead defeats the purpose of that system the moment it would actually be useful, undoing the investment just made in ownership and escalation structure. Bringing in outside counsel on the FAA risk specifically doesn't address what actually just happened in this room — the new information here is about engineering risk, not a regulatory development, so outside legal counsel responds to a problem that didn't just surface." },
  "P5::strained": { bestIndex: 2, explanation: "Dr. Osei, the most qualified person in the room, explicitly says she needs to read the full guidance before she can characterize what actually changed — meaning nobody present yet knows the real scope of the impact. Pausing all planning reacts to alarm before that scope is known, which is overreacting to an unconfirmed risk; continuing to plan as if nothing changed risks building real work on a regulatory foundation that may have just shifted, which is underreacting to a real, named threat to the project's riskiest certification pathway. Requesting an informal pre-consultation with the FAA office is the only option that actually closes the specific information gap this scene establishes — getting a real answer from the source, faster than waiting on Osei's own reading or proceeding blind without one." },
  "P5b::base": { bestIndex: 0, explanation: "The scene poses a specific, unanswered question: whether the FAA guidance change and the chip shortage are equally urgent, or whether one actually dwarfs the other — and explicitly frames that as something instinct can't reliably answer, which is why it needs real scoring. Ranking by gut judgment is exactly the approach the scene already identifies as insufficient for this specific comparison. Focusing analysis on only the top three has a sharper problem: it presupposes which three risks are actually the top ones before doing the analysis that would establish that — the informal card-sort earlier separated a rough cluster by feel, but never answered the FAA-versus-chip-shortage question this beat exists to resolve, so choosing to analyze only three assumes the answer to the very question being asked." },
  "P6::thriving": { bestIndex: 0, explanation: "Felix's redesigned board is a real, credible option, not a strawman — but redesigning a flight-controller board means touching engineering validation and potentially re-triggering certification review on the one workstream this project has already confirmed is its least controllable, most schedule-fragile dependency. Dual-sourcing solves the exact same single-source exposure without touching the validated design at all, which makes it the lower-risk path to the same protection. Single-sourcing and monitoring takes no real action against a shortage that's already been confirmed as industry-wide, not theoretical." },
  "P6::strained": { bestIndex: 0, explanation: "The vendor just said, directly, that they're rationing allocation and Soren isn't a large enough account to jump the line — betting on them coming through anyway ignores information that was just given directly, not speculation. Buying out smaller distributors' remaining inventory might cover an immediate gap, but 'remaining inventory' implies a bounded, one-time quantity, not a reliable ongoing source for an actual production run. Scrambling to qualify a genuine backup vendor is harder to do reactively than it would have been proactively, but it's the only option that addresses the real underlying problem — an ongoing, reliable supply — rather than either ignoring the shortage or patching it with a quantity that won't sustain production." },
  "CN2::base": { bestIndex: 0, explanation: "This isn't the same situation as the chip shortage, even though both involve single-source exposure on avionics-adjacent hardware. The chip's risk was about availability of a known-good part — a second vendor of a comparable chip solved it without touching the validated design. This connector's risk is structural: the mounting geometry is proprietary to one supplier, so there's no equivalent second source for the same part the way there was for the chip — funding a redesign to remove the dependency is the only option that actually addresses a failure mode this specific, rather than a coincidental echo of 'redesign is risky' from a different problem shape. A safety stock buffer only delays the consequence if the supplier's failure is permanent rather than temporary, which is exactly the scenario Felix is describing. Accepting the risk and waiting for a sign of strain assumes a visible warning will precede failure, which isn't guaranteed for an operation this small — the scene's own point is that this is the kind of risk that looks small right up until the day it isn't, with no promised warning in between." },
  "P7::thriving": { bestIndex: 0, explanation: "The technical college already runs a program producing exactly the graduates Soren needs, with no current local employer hiring from it and a program director eager to partner — building an in-house training program from day one duplicates training infrastructure that already exists and is sitting unused. Reactive hiring wastes a real, but not necessarily permanent, advantage: the absence of competing employers right now is a window, not a guarantee, and other local manufacturers could start recruiting from the same pool once Soren's hiring becomes visible." },
  "P7::strained": { bestIndex: 0, explanation: "Diego himself frames this as a choice between bringing people in or growing them locally — but he explicitly names the cost of growing locally as time: 'slowly, starting now.' That's a real, viable long-term strategy, but it doesn't address a gap that's already acute after two weeks with one barely-qualified applicant; relocation packages solve the same underlying problem on a timeline that actually matches the urgency. A staffing agency can fill seats faster, but it's not one of the two paths Diego — the person who actually understands this labor market — considered as a real strategy, because agency staffing tends to produce a transient workforce, not the stable, skilled team a multi-year production facility actually needs." },
  "DG1::base": { bestIndex: 2, explanation: "Compensation bands exist specifically to prevent ad hoc, candidate-by-candidate bidding wars that erode internal equity once other employees inevitably learn about them — an above-band offer breaks that structure permanently for the first sufficiently impressive candidate, and the band stops meaning anything once it's been broken once. A signing bonus is the tool that exists precisely for this situation: it bridges the gap against a real competing offer without permanently distorting the base compensation structure everyone else is hired against. A standard offer, meanwhile, isn't the safe choice here — Rosa has a real, named competing offer that pays more, and doing nothing to address that financial gap risks losing a candidate the company has already recognized as exceptional, over exactly the kind of gap a signing bonus is built to close." },
  "P7b::base": { bestIndex: 0, explanation: "Diego's own warning names a specific risk — people getting sick, quitting, or getting pulled away — and a rough estimate is exactly the kind of approach that misses that sort of buffer need, where a detailed phase-by-phase estimate tied to actual ramp timing (the scene's own example of four technicians by week nine) is built to catch it. Benchmarking against a comparable facility has already shown its limits earlier in this same project, when the cost-estimating equivalent failed to capture what's specific to this build; the same problem applies here, since a generic facility benchmark wouldn't capture a labor market as specifically thin as the one already confirmed for flight-controller calibration specifically." },
  "P8::strained": { bestIndex: 2, explanation: "The constraint this scene actually names is volume, not price — the cheaper supplier is described as the only one who can hit Soren's production volume, which is a different problem than the safer supplier simply costing more. Pushing for the safer supplier while hoping to find savings elsewhere addresses a price gap that isn't the actual named obstacle, and the budget has already been stretched repeatedly with no fresh source of savings established anywhere on the table. Negotiating a phased ramp-up with the safer supplier addresses the real constraint directly — getting real volume moving without abandoning the safety record Dr. Osei specifically flagged as the difference that protects Soren's due-diligence position. Going with the volume supplier despite the safety concerns is the exact decision her email warned wouldn't hold up under FAA scrutiny." },
  "P8b::base": { bestIndex: 0, explanation: "The scene states plainly that the current hallway-and-Slack approach has worked so far mostly by luck — continuing it means knowingly relying on the same luck the project itself just flagged as unreliable. Delegating to a dedicated comms lead sounds like a reasonable division of labor, but no such role currently exists or has been budgeted anywhere in this project, and proposing one now, on a budget that's already absorbed an equipment overage and a tense conversation about shrinking the topline number, raises a funding question this option doesn't even acknowledge. Building the formal plan directly is the only option that closes the actual gap without either continuing on luck or quietly assuming a new hire that hasn't been discussed or paid for." },
  "P9::thriving": { bestIndex: 0, explanation: "Written notice and office hours are real, legitimate techniques in general, but they're one-way and passive — they require the resident to come looking for information rather than the project reaching the community directly. With a noise-and-traffic flyer already circulating and the zoning board still genuinely curious rather than organized against the project, the scene specifically calls for actively closing a narrative window while curiosity is still the prevailing mood, which a face-to-face, two-way forum does more directly than a written notice ever could. Handling concerns reactively risks losing that same window to whatever narrative fills the vacuum first, once curiosity hardens into something less open." },
  "P9::strained": { bestIndex: 0, explanation: "The actual problem the article created is a public credibility charge — it specifically called the project secretive. Meeting privately with only the most vocal critics, however well-intentioned, responds to a public secrecy charge with more closed-door, selective engagement, which structurally resembles the very thing being criticized even though the intent behind it is completely different. A public question-and-answer session is the only option that visibly contradicts the secretive framing in front of the same community that read it. Staying quiet doesn't just fail to help — it confirms the framing by omission, leaving an unanswered public charge to harden into the accepted story." },
  "P10::thriving": { bestIndex: 0, explanation: "The scene already shows the critical validation happened in real time: Marcus asked sharp, specific questions about the FAA pathway — the single highest-risk item on this baseline — and was satisfied by the answers. Once a sponsor has genuinely engaged with the riskiest part of a plan and signed off on it, getting formal sign-off and moving into execution is simply the correct next step; a baseline's purpose is to trigger execution, not to accumulate extra approval rituals. Walking through the full risk register again treats a control that was already satisfied as if it hadn't happened, which delays execution for a check that's already been made. Asking for a named backup decision-maker solves a problem nobody has actually raised — there's no indication anywhere in this scene that Marcus's authority or availability is in question, and building governance structure around a risk that was never identified is itself a process misstep, not real diligence." },
  "P10::strained": { bestIndex: 0, explanation: "With Marcus noticing a real, live discrepancy between the schedule's risk-mitigation assumptions and what the budget actually funds, presenting the baseline honestly is the only option that gives him a true picture to act on — this isn't a redundant check, it's the first time this specific tension has been named out loud. An optimistic version misrepresents a real, unresolved conflict to the project's most senior stakeholder. Proposing a scope trim right now skips a necessary step: the scene names two distinct possible causes — under-funded risk mitigation and an optimistic hiring pace — and a scope cut might not fix either one if hiring pace turns out to be the actual binding constraint. Solutioning before diagnosing which constraint is real risks cutting real product value to fix a problem that scope was never causing." },
  "P10::failing": { bestIndex: 0, explanation: "With the schedule and budget contradicting each other in multiple places and risk items that were named but genuinely never mitigated, calling an emergency replanning session and owning the problem fully is the only response that actually addresses what's broken, on a baseline Marcus has just correctly identified as never having been real. Forcing sign-off anyway gambles the entire project on hoping execution will fix what planning didn't — a known failure pattern, not a real risk response. Asking for a pause to bring outside review, instead of answering Marcus's direct question right now, is a legitimate tool used at the wrong moment: he's asking what happens if they sign off today, and deflecting that question to a third party reads as avoiding ownership rather than providing it. Dropping Priya's modular-core investment frees real budget, but it's a lever pulled on the wrong target — the named causes are an unfunded risk-mitigation plan and an optimistic hiring assumption, and cutting a forward-looking investment that was never part of either one doesn't actually correct what made the baseline false." },
  "E1::thriving": { bestIndex: 2, explanation: "The press piece is specifically about new jobs coming to the area, which makes using that exact moment to recruit floor talent a direct, logical match between the opportunity and the action — hiring is already a live, active process at this point, so this amplifies something already running rather than introducing anything premature. Using construction being ahead of schedule as a reason to lock vendor contracts quickly connects two unrelated workstreams — the framing crew's pace says nothing about whether contract terms are actually ready to finalize, and rushing a procurement decision because of good news in a different area is a real non-sequitur. Verifying every permit is a reasonable general instinct, but nothing in this specific scene actually points at permits as the live risk; treating it as the right answer here borrows a complication that only exists in a different, mutually exclusive version of how this stretch of the project could have gone." },
  "E1::strained": { bestIndex: 0, explanation: "Escalating directly to the city addresses the actual blocker — a permit that should have been bundled and wasn't — rather than working around it or simply absorbing the delay. Waiting in the normal queue burns float the project may not actually have to spare; rerouting the crew to a permit-exempt section is a reasonable stopgap but doesn't solve the underlying permitting problem that will eventually need solving anyway." },
  "E1::failing": { bestIndex: 0, explanation: "With a news van already on site and Marcus directly aware of it, taking full accountability and presenting a real recovery plan is the only response that has any chance of preserving credibility with both the sponsor and the public. Blaming the permitting office looks defensive and doesn't fix anything; a permitting expediter may help operationally but doesn't address the trust damage already done without an honest accounting first." },
  "UN1::base": { bestIndex: 1, explanation: "Marisol's actual question isn't whether Soren should unionize — that's a real business decision PMI has no opinion on — it's whether she gets a direct answer or another deferral, which is exactly the distinction she draws herself: 'an oversight or an answer.' Inviting her to tour the facility and meet the hires before any formal commitment is, structurally, the same move that already failed her once in Feasibility — an engagement gesture offered in place of the direct answer she's explicitly asking for, repeating a pattern she's already named as the thing she doesn't trust. Committing in writing to prevailing wage as a non-union shop is a real, direct answer that resolves the question for every future round of hiring without the added cost of reopening offers that have already been extended and accepted — formalizing full union partnership now is a legitimate strategic choice too, but it carries that specific, avoidable cost where the other option doesn't, for the same underlying commitment to a direct answer." },
  "E2::thriving": { bestIndex: 2, explanation: "The scene frames this explicitly as 'a better problem to have' — a genuinely close call between two real strengths, with nothing in this version of events establishing any urgency or deadline pressure. Given that room to be careful, piloting both candidates part-time gets real evidence of fit and performance before locking in a long-term hire for a role this consequential, rather than committing to either profile on resume comparison alone. Choosing either candidate outright skips that validation when the scene itself signals there's no cost to taking it." },
  "E2::strained": { bestIndex: 2, explanation: "With the presumed floor lead candidate already gone to a counteroffer, restarting the search with a specialized recruiter is the option most likely to actually produce a qualified hire for a role this central to floor operations, even though it costs more time than the other options. Counter-offering aggressively for someone who already chose to stay elsewhere has a low chance of success; promoting internally accepts a real learning-curve risk for a role the project can't currently afford to have struggle." },
  "E2::failing": { bestIndex: 2, explanation: "When staffing has fallen this far behind both the floor lead and the broader assembly team, temporarily slowing the production ramp to match real capacity is the only option that doesn't either burn out the remaining team or pay a premium for the same understaffing problem. A staffing agency at a premium treats the symptom rather than rebuilding sustainable capacity; pushing the existing thin team harder risks the kind of burnout and turnover that compounds the original shortage." },
  "E3::thriving": { bestIndex: 0, explanation: "The disagreement isn't purely a factual throughput question — the scene specifically emphasizes that both people are invested in getting it right rather than winning, which is as much about a floor lead and an established engineer learning to work together as it is about assembly sequence. Facilitating a structured discussion serves both halves of that at once: it lets their combined expertise reason through the throughput question while building the working relationship between two people who'll need to collaborate repeatedly going forward. Prototyping both approaches would answer the empirical half alone, but doing it for real would mean running two parallel physical assembly sequences this early in the production ramp, when parts are still moving from drawings to physical hardware — a real resource cost for capturing only part of what this moment actually calls for. Making the call unilaterally skips the collaborative half entirely." },
  "E3::strained": { bestIndex: 0, explanation: "A visibly bending team morale and an unnamed leadership gap need direct intervention before they harden into resentment or turnover — addressing it directly and resetting norms is the only option that actually closes the gap rather than hoping it resolves on its own. Letting the team self-resolve risks the conflict festering further under a leader who is, by the scene's own description, still finding their footing; formal HR mediation is a heavier process than a floor-level disagreement currently warrants." },
  "E3::failing": { bestIndex: 2, explanation: "When understaffing and a leadership gap have already produced a walkout, personally working the floor for a shift is the most direct way to rebuild trust with a team that's just watched leadership fail to prevent exactly this outcome — presence matters more than process in the immediate aftermath of a visible breakdown. Stopping the line for an all-hands reset is reasonable but doesn't address the credibility gap the same way showing up does; disciplining the technician who walked punishes the symptom of a leadership and staffing failure rather than addressing its actual cause." },
  "SF1::base": { bestIndex: 0, explanation: "A near-miss that could have caused real injury deserves a full safety response, not a partial one — stopping all forklift traffic for a complete walkway audit addresses the systemic conditions that allowed the near-miss to happen at all, not just the single incident. Filing a report while continuing operations otherwise leaves other potential hazards unexamined; handling it quietly without any formal report is a genuine safety-culture failure that leaves the underlying risk completely unaddressed and erodes trust if it's ever discovered." },
  "E4::thriving": { bestIndex: 0, explanation: "This particular investor is specifically characterized as someone who enjoys being underestimated and asks sharper questions than expected — exactly the kind of audience who can probe past a rehearsed presentation into any part of the operation. The PM, holding the full integrated picture across budget, schedule, and risk, is positioned to handle that kind of unpredictable, cross-cutting question everywhere a stage-managed or team-led tour would not be; if a floor employee fielded a sharp question outside their own station's expertise, the conversation could stall in a way it wouldn't with the PM leading throughout. Stage-managing the tour risks looking exactly as choreographed as it is to someone this perceptive." },
  "E4::strained": { bestIndex: 0, explanation: "Transparency about both the real challenges and the recovery plan gives investors an accurate picture they can actually evaluate. Hiding the rough areas is a real disclosure problem, not just a stylistic preference — investors are making financial decisions partly based on what they're shown, and selectively curating that view misrepresents the facility's actual state. Rescheduling a week out assumes the specific problems — an active quality hold, unfinished cable management — will conveniently resolve in exactly that window, which nothing in the situation actually establishes; if they haven't, the project risks either repeating the same scramble on the new date or an even more damaging second reschedule." },
  "E4::failing": { bestIndex: 2, explanation: "Moving the meeting off-site and presenting data instead of a tour preserves the commitment of a visit investors have already scheduled and traveled for, while removing the specific risk of a visibly chaotic floor — postponing entirely avoids that risk too, but a confirmed visit called off this close to the scheduled time can itself read as a worse signal, raising exactly the doubts a format change avoids by still meeting, just differently. Proceeding and hoping nobody notices risks a visibly chaotic experience that damages confidence far more than either alternative." },
